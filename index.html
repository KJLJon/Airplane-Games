<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="18 offline airplane games — no wifi needed. Install as a PWA on Android.">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <base href="/Airplane-Games/">
  <title>Airplane Games</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">

  <style>
    /* ── Hub-specific styles ─────────────────────────────────── */

    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Stars background ──────────────────────────────────── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.5) 0%, transparent 100%),
        radial-gradient(1px 1px at 30% 40%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 55% 10%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 72% 60%, rgba(255,255,255,0.25) 0%, transparent 100%),
        radial-gradient(1px 1px at 88% 25%, rgba(255,255,255,0.45) 0%, transparent 100%),
        radial-gradient(1px 1px at 20% 75%, rgba(255,255,255,0.3) 0%, transparent 100%),
        radial-gradient(1px 1px at 65% 85%, rgba(255,255,255,0.35) 0%, transparent 100%),
        radial-gradient(1px 1px at 45% 55%, rgba(255,255,255,0.2) 0%, transparent 100%),
        radial-gradient(1px 1px at 92% 78%, rgba(255,255,255,0.4) 0%, transparent 100%),
        radial-gradient(1px 1px at 5%  90%, rgba(255,255,255,0.3) 0%, transparent 100%);
      pointer-events: none;
      z-index: 0;
    }

    main, header, footer { position: relative; z-index: 1; }

    /* ── Header ────────────────────────────────────────────── */
    .hub-header {
      text-align: center;
      padding: 2.5rem 1rem 2rem;
      background: linear-gradient(180deg, rgba(26,26,46,0.95) 0%, transparent 100%);
      border-bottom: 1px solid var(--border-subtle);
    }

    .hub-title-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .hub-plane-icon {
      width: 2.4rem;
      height: 2.4rem;
      flex-shrink: 0;
    }

    .hub-title {
      font-family: 'Outfit', system-ui, sans-serif;
      font-size: clamp(1.9rem, 5.5vw, 3.2rem);
      font-weight: 900;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, #f0f0f5 30%, var(--accent-primary) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0;
      line-height: 1.1;
    }

    .hub-tagline {
      font-family: 'Outfit', system-ui, sans-serif;
      font-size: clamp(0.95rem, 2.2vw, 1.1rem);
      font-weight: 600;
      color: var(--accent-warm);
      margin: 0.55rem 0 0;
      letter-spacing: 0.01em;
    }

    .hub-subtitle {
      font-size: 0.82rem;
      color: var(--text-dim);
      margin: 0.3rem 0 0;
      opacity: 0.75;
      letter-spacing: 0.02em;
    }

    /* ── Install button ────────────────────────────────────── */
    #install-btn {
      display: none;
      margin: 1.2rem auto 0;
      align-items: center;
      gap: 0.45rem;
      padding: 0.6rem 1.5rem;
      background: transparent;
      border: 1.5px solid var(--accent-primary);
      color: var(--accent-primary);
      border-radius: 2rem;
      font-size: 0.88rem;
      font-family: 'Outfit', system-ui, sans-serif;
      font-weight: 700;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background var(--transition-base), box-shadow var(--transition-base);
    }

    #install-btn:hover {
      background: var(--glow-purple);
      box-shadow: 0 0 16px rgba(124,106,247,0.35);
    }

    #install-btn:active {
      transform: scale(0.97);
    }

    #install-btn svg {
      width: 1rem;
      height: 1rem;
      fill: currentColor;
    }

    /* ── Games grid ─────────────────────────────────────────── */
    .games-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      padding: 1.5rem 1rem;
      max-width: 960px;
      margin: 0 auto;
      flex: 1;
    }

    /* Tablet */
    @media (max-width: 680px) {
      .games-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 0.8rem;
        padding: 1rem 0.75rem;
      }
    }

    /* Mobile */
    @media (max-width: 400px) {
      .games-grid {
        grid-template-columns: 1fr;
        gap: 0.7rem;
        padding: 0.75rem;
      }
    }

    /* ── Game card ──────────────────────────────────────────── */
    .game-card {
      --card-accent: var(--accent-primary);
      position: relative;
      display: flex;
      flex-direction: column;
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-top: 3px solid var(--card-accent);
      border-radius: var(--radius-lg);
      padding: 1.1rem 1rem 0.9rem;
      text-decoration: none;
      overflow: hidden;
      transition: transform var(--transition-fast), box-shadow var(--transition-fast), border-color var(--transition-fast);
      cursor: pointer;
    }

    /* Subtle top-left glow matching card accent */
    .game-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: radial-gradient(ellipse at top left, var(--card-accent), transparent 65%);
      opacity: 0;
      transition: opacity var(--transition-base);
      pointer-events: none;
    }

    .game-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(0,0,0,0.45), 0 0 0 1px var(--card-accent);
      border-color: var(--card-accent);
    }

    .game-card:hover::before {
      opacity: 0.08;
    }

    .game-card:active {
      transform: translateY(-1px);
    }

    /* ── Card icon ──────────────────────────────────────────── */
    .card-icon {
      display: flex;
      align-items: center;
      justify-content: flex-start;
      width: 2.6rem;
      height: 2.6rem;
      border-radius: var(--radius-md);
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.07);
      margin-bottom: 0.7rem;
      flex-shrink: 0;
      color: var(--card-accent);
    }

    .card-icon svg {
      width: 1.4rem;
      height: 1.4rem;
      margin: auto;
      fill: var(--card-accent);
      flex-shrink: 0;
    }

    /* ── Card text ──────────────────────────────────────────── */
    .card-title {
      font-family: 'Outfit', system-ui, sans-serif;
      font-size: 0.98rem;
      font-weight: 700;
      color: var(--text-primary);
      margin: 0 0 0.3rem;
      line-height: 1.2;
    }

    .card-badge {
      display: inline-block;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      padding: 0.18rem 0.55rem;
      border-radius: 1rem;
      border: 1px solid var(--card-accent);
      color: var(--card-accent);
      background: rgba(255,255,255,0.04);
      margin-bottom: 0.45rem;
      line-height: 1.4;
    }

    .card-desc {
      font-size: 0.75rem;
      color: var(--text-dim);
      line-height: 1.45;
      margin: 0;
      flex: 1;
    }

    .card-score {
      margin-top: 0.65rem;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--accent-warm);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .card-score--empty {
      color: var(--text-dim);
      font-weight: 400;
      opacity: 0.6;
    }

    .card-score svg {
      width: 0.75rem;
      height: 0.75rem;
      fill: var(--accent-warm);
      flex-shrink: 0;
    }

    .card-score--empty svg {
      fill: var(--text-dim);
    }

    /* ── Footer ─────────────────────────────────────────────── */
    .hub-footer {
      text-align: center;
      padding: 1.5rem 1rem 2rem;
      color: var(--text-dim);
      font-size: 0.75rem;
      opacity: 0.55;
      border-top: 1px solid var(--border-subtle);
    }
  </style>
</head>

  <script>
    /* ── PWA Install flow ─────────────────────────────────── */
    let deferredPrompt;

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('install-btn').style.display = 'flex';
    });

    document.getElementById('install-btn').addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      deferredPrompt = null;
    });

    window.addEventListener('appinstalled', () => {
      document.getElementById('install-btn').style.display = 'none';
    });

    /* ── Service Worker registration + update banner ──────── */
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker
        .register('/Airplane-Games/sw.js', { scope: '/Airplane-Games/' })
        .then(reg => {
          console.log('[SW] registered, scope:', reg.scope);
          function trackWorker(worker) {
            worker.addEventListener('statechange', () => {
              if (worker.state === 'installed' && navigator.serviceWorker.controller) {
                showSWUpdateBanner(reg);
              }
            });
          }
          if (reg.installing) trackWorker(reg.installing);
          reg.addEventListener('updatefound', () => trackWorker(reg.installing));
          if (reg.waiting && navigator.serviceWorker.controller) showSWUpdateBanner(reg);
        })
        .catch(err => console.warn('[SW] registration failed:', err));
      let _hubRefreshing = false;
      navigator.serviceWorker.addEventListener('controllerchange', () => {
        if (!_hubRefreshing) { _hubRefreshing = true; window.location.reload(); }
      });
    }

    function showSWUpdateBanner(reg) {
      if (document.getElementById('ag-update-banner')) return;
      const banner = document.createElement('div');
      banner.id = 'ag-update-banner';
      banner.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#1e293b;color:#f0f0f5;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;z-index:99999;border-bottom:2px solid #7c6af7;font-size:14px;';
      banner.innerHTML = '<span>New version available!</span><button id="ag-update-btn" style="background:#7c6af7;color:#fff;border:none;border-radius:6px;padding:5px 14px;cursor:pointer;font-size:13px;font-weight:600">Update Now</button>';
      document.body.prepend(banner);
      document.getElementById('ag-update-btn').addEventListener('click', () => {
        const w = reg.waiting;
        if (w) w.postMessage({ type: 'SKIP_WAITING' });
      });
    }

    /* ── Score formatting ──────────────────────────────────── */
    function formatScore(score) {
      if (typeof score !== 'number' || !isFinite(score)) return String(score);
      if (score >= 1_000_000) return (score / 1_000_000).toFixed(1).replace(/\.0$/, '') + 'M';
      if (score >= 1_000)     return (score / 1_000).toFixed(1).replace(/\.0$/, '') + 'k';
      return String(score);
    }

    /* Trophy icon (inline, reused per card) */
    const TROPHY_SVG = `<svg viewBox="0 0 16 16" aria-hidden="true">
      <path d="M4 2h8v5a4 4 0 01-8 0V2z"/>
      <path d="M2 2h2v3a1 1 0 01-2 0V2zM12 2h2v3a1 1 0 01-2 0V2z" opacity="0.6"/>
      <path d="M6 11v1.5M10 11v1.5M5 13.5h6" stroke-width="1.2" stroke-linecap="round" fill="none"/>
    </svg>`;

    const DASH_SVG = `<svg viewBox="0 0 16 16" aria-hidden="true">
      <path d="M4 8h8" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.5"/>
    </svg>`;

    /* ── Build grid ────────────────────────────────────────── */
    function buildGrid() {
      // shared.js loaded deferred — wait for it if needed
      const scores = (typeof Scores !== 'undefined') ? Scores.getAll() : {};
      const grid = document.getElementById('games-grid');

      grid.innerHTML = GAMES.map(game => {
        const record = scores[game.id];
        let scoreHtml;

        if (record && typeof record.score === 'number') {
          scoreHtml = `<div class="card-score">
            ${TROPHY_SVG}
            Best:&nbsp;<strong>${formatScore(record.score)}</strong>
          </div>`;
        } else {
          scoreHtml = `<div class="card-score card-score--empty">
            ${DASH_SVG}
            No score yet
          </div>`;
        }

        return `<a
          class="game-card"
          href="${game.path}"
          style="--card-accent: ${game.accent}"
          aria-label="Play ${game.title}"
        >
          <span class="card-icon" aria-hidden="true">${game.icon}</span>
          <div class="card-title">${game.title}</div>
          <span class="card-badge">${game.badge}</span>
          <p class="card-desc">${game.desc}</p>
          ${scoreHtml}
        </a>`;
      }).join('\n');
    }

    /* Run immediately — shared.js is defer so we wait for DOMContentLoaded */
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', buildGrid);
    } else {
      buildGrid();
    }
  </script>
