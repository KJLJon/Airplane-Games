<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <base href="/airplane-games/">
  <title>Jet Stream — Airplane Games</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    body { display:flex; flex-direction:column; height:100dvh; overflow:hidden; background:#0a1628; }
    .game-header { display:flex; align-items:center; gap:8px; padding:8px 16px; background:rgba(0,0,0,0.5); border-bottom:1px solid rgba(255,255,255,0.1); flex-shrink:0; z-index:10; }
    .game-header h1 { font-family:'Outfit',sans-serif; font-size:1.1rem; color:#fff; flex:1; margin:0; }
    .btn { padding:8px 12px; background:rgba(255,255,255,0.1); border:1px solid rgba(247,169,74,0.6); color:#f7a94a; border-radius:8px; cursor:pointer; font-size:0.85rem; min-height:44px; font-family:'Inter',sans-serif; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; }
    .btn:hover { background:rgba(247,169,74,0.2); }
    #canvas { display:block; flex:1; touch-action:none; cursor:pointer; }
    #ui-overlay { position:fixed; top:0; left:0; right:0; bottom:0; pointer-events:none; z-index:5; }
    .score-overlay { position:fixed; top:60px; left:50%; transform:translateX(-50%); font-family:'Outfit',sans-serif; font-size:2rem; font-weight:700; color:#fff; text-shadow:0 2px 8px rgba(0,0,0,0.8); pointer-events:none; z-index:6; }
    .boost-bar { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); width:120px; height:8px; background:rgba(255,255,255,0.2); border-radius:4px; pointer-events:none; z-index:6; overflow:hidden; }
    .boost-fill { height:100%; background:linear-gradient(90deg,#7c6af7,#f7a94a); border-radius:4px; transition:width 0.1s; }
    .boost-label { position:fixed; bottom:32px; left:50%; transform:translateX(-50%); font-size:0.75rem; color:rgba(255,255,255,0.6); pointer-events:none; z-index:6; }
    #start-screen, #gameover-screen { position:fixed; inset:0; background:rgba(10,22,40,0.9); z-index:20; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:16px; padding:20px; }
    #start-screen h2, #gameover-screen h2 { font-family:'Outfit',sans-serif; font-size:2rem; color:#fff; margin:0; text-align:center; }
    #start-screen p, #gameover-screen p { color:rgba(255,255,255,0.6); text-align:center; margin:0; font-size:0.9rem; }
    .stat-row { display:flex; gap:24px; }
    .stat { text-align:center; }
    .stat .num { font-size:1.8rem; font-weight:700; color:#f7a94a; font-family:'Outfit',sans-serif; }
    .stat .lbl { font-size:0.8rem; color:rgba(255,255,255,0.5); }
    #gameover-screen { display:none; }
  </style>
</head>
<body>
  <div class="game-header">
    <a href="/airplane-games/" class="btn btn-back">← Hub</a>
    <h1>Jet Stream</h1>
    <span id="mode-label" style="font-size:0.8rem;color:rgba(255,255,255,0.5);">Free Play</span>
  </div>
  <canvas id="canvas"></canvas>
  <div class="score-overlay" id="score-overlay">0m</div>
  <div class="boost-bar"><div class="boost-fill" id="boost-fill" style="width:0%"></div></div>
  <div class="boost-label">BOOST</div>
  <div id="start-screen">
    <h2>Jet Stream</h2>
    <p>Tap / hold to rise · Release to descend<br>Avoid the clouds · Activate boost when meter fills</p>
    <div class="stat-row">
      <div class="stat"><div class="num" id="ss-best">0m</div><div class="lbl">Best</div></div>
      <div class="stat"><div class="num" id="ss-daily">0m</div><div class="lbl">Daily Best</div></div>
    </div>
    <button class="btn" id="playBtn" style="font-size:1rem;padding:12px 32px;">Play</button>
    <button class="btn" id="dailyBtn" style="font-size:0.9rem;">Daily Challenge</button>
    <div style="font-size:0.75rem;color:rgba(255,255,255,0.4);" id="seed-display"></div>
  </div>
  <div id="gameover-screen">
    <h2>Crash! 💥</h2>
    <div class="stat-row">
      <div class="stat"><div class="num" id="go-dist">0m</div><div class="lbl">Distance</div></div>
      <div class="stat"><div class="num" id="go-best">0m</div><div class="lbl">Best</div></div>
    </div>
    <button class="btn" id="restartBtn" style="font-size:1rem;padding:12px 32px;">Play Again</button>
    <a href="/airplane-games/" class="btn">← Hub</a>
  </div>
  <script src="js/shared.js"></script>
  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H, animId;
    let pressing = false;
    let gameState = 'idle'; // idle | playing | dead
    let mode = 'free', currentSeed = 0;
    let best = parseInt(localStorage.getItem('ag_flapper_best')||'0');
    let dailyBest = parseInt(localStorage.getItem('ag_flapper_daily')||'0');

    document.getElementById('ss-best').textContent = best + 'm';
    document.getElementById('ss-daily').textContent = dailyBest + 'm';

    function resize() {
      W = canvas.width = canvas.offsetWidth;
      H = canvas.height = canvas.offsetHeight;
    }

    // Game state
    let jet, pipes, particles, boostMeter, boosting, boostTime, distance, speed, frameCount, rng;
    const GAP = 160;
    const PIPE_W = 60;

    function initGame(seed) {
      rng = createRNG(seed);
      jet = { x: W*0.2, y: H*0.5, vy: 0, angle: 0, trail: [] };
      pipes = [];
      particles = [];
      boostMeter = 0;
      boosting = false;
      boostTime = 0;
      distance = 0;
      speed = 2.5;
      frameCount = 0;
      // Spawn initial pipes
      for (let i=0;i<4;i++) spawnPipe((i+1)*280 + W*0.5);
    }

    function spawnPipe(x) {
      const gapY = rng.int(H*0.2, H*0.75);
      const actualGap = boosting ? GAP+60 : GAP;
      pipes.push({x, gapY, w: PIPE_W, passed: false});
    }

    function update() {
      frameCount++;
      distance += speed;
      speed = 2.5 + distance/8000;

      // Jet physics
      const gravity = boosting ? 0.12 : 0.22;
      const thrust = pressing ? (boosting ? -0.45 : -0.35) : 0;
      jet.vy += gravity + thrust;
      jet.vy = Math.max(-8, Math.min(10, jet.vy));
      jet.y += jet.vy;
      jet.angle = Math.atan2(jet.vy, 6);

      // Trail
      jet.trail.unshift({x:jet.x, y:jet.y, a:0.8});
      if (jet.trail.length > 12) jet.trail.pop();
      jet.trail.forEach(t => t.a -= 0.06);

      // Boost meter
      if (!boosting) {
        boostMeter = Math.min(100, boostMeter + 0.15);
        if (boostMeter >= 100 && boostTime <= 0) {
          // Auto-suggest boost
        }
      } else {
        boostTime--;
        if (boostTime <= 0) { boosting = false; boostMeter = 0; }
      }
      document.getElementById('boost-fill').style.width = boostMeter + '%';

      // Spawn pipes
      if (pipes.length === 0 || pipes[pipes.length-1].x < W + 100) {
        const lastX = pipes.length ? pipes[pipes.length-1].x : W;
        spawnPipe(lastX + rng.int(220, 320));
      }

      // Update pipes
      for (const p of pipes) {
        p.x -= speed;
        if (!p.passed && p.x + p.w < jet.x) {
          p.passed = true;
        }
      }
      pipes = pipes.filter(p => p.x + p.w > -10);

      // Collision
      const jw=22, jh=14;
      if (jet.y < 0 || jet.y > H) { die(); return; }
      for (const p of pipes) {
        if (jet.x+jw/2 > p.x && jet.x-jw/2 < p.x+p.w) {
          if (jet.y-jh/2 < p.gapY-GAP/2 || jet.y+jh/2 > p.gapY+GAP/2) {
            // Near miss check
            const margin = 10;
            if (jet.y-jh/2 < p.gapY-GAP/2+margin || jet.y+jh/2 > p.gapY+GAP/2-margin) {
              // Near miss visual
            }
            die(); return;
          }
        }
      }

      // Particles
      if (frameCount % 2 === 0) {
        particles.push({x:jet.x-10, y:jet.y, vx:-1-Math.random(), vy:(Math.random()-0.5)*0.8, life:1, r:2+Math.random()*2});
      }
      particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life-=0.04;});
      particles=particles.filter(p=>p.life>0);

      document.getElementById('score-overlay').textContent = Math.floor(distance/10) + 'm';
    }

    function die() {
      gameState = 'dead';
      cancelAnimationFrame(animId);
      const dist = Math.floor(distance/10);
      if (dist > best) { best=dist; localStorage.setItem('ag_flapper_best',best); }
      if (mode==='daily' && dist > dailyBest) { dailyBest=dist; localStorage.setItem('ag_flapper_daily',dailyBest); }
      Scores.set('flapper', best);
      document.getElementById('go-dist').textContent = dist+'m';
      document.getElementById('go-best').textContent = best+'m';
      document.getElementById('gameover-screen').style.display = 'flex';
    }

    // Drawing
    function drawBackground() {
      // Sky gradient
      const grad = ctx.createLinearGradient(0,0,0,H);
      grad.addColorStop(0,'#0a1628');
      grad.addColorStop(1,'#1a3a5c');
      ctx.fillStyle = grad;
      ctx.fillRect(0,0,W,H);

      // Parallax clouds (background)
      ctx.fillStyle = 'rgba(255,255,255,0.03)';
      const t = frameCount * 0.3;
      for (let i=0;i<5;i++) {
        const cx = ((i*200+t*0.4)%( W+200))-100;
        const cy = 50 + i*40;
        drawCloud(cx, cy, 80+i*20, 0.04);
      }
    }

    function drawCloud(x,y,w,alpha) {
      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#aac';
      ctx.beginPath();
      ctx.ellipse(x,y,w*0.5,w*0.2,0,0,Math.PI*2);
      ctx.ellipse(x+w*0.15,y-w*0.1,w*0.3,w*0.15,0,0,Math.PI*2);
      ctx.ellipse(x-w*0.15,y-w*0.07,w*0.25,w*0.12,0,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    function drawPipes() {
      pipes.forEach(p => {
        const topH = p.gapY - GAP/2;
        const botY = p.gapY + GAP/2;
        const botH = H - botY;

        // Top cloud
        const grad1 = ctx.createLinearGradient(p.x,0,p.x+p.w,0);
        grad1.addColorStop(0,'#5a8faa'); grad1.addColorStop(1,'#7ab5d0');
        ctx.fillStyle = grad1;
        ctx.fillRect(p.x,0,p.w,topH);
        // Fluffy bottom of top cloud
        ctx.fillStyle = '#8bc8e0';
        ctx.beginPath();
        ctx.ellipse(p.x+p.w/2, topH, p.w*0.6, 20, 0, 0, Math.PI*2);
        ctx.fill();

        // Bottom cloud
        ctx.fillStyle = grad1;
        ctx.fillRect(p.x, botY, p.w, botH);
        // Fluffy top of bottom cloud
        ctx.fillStyle = '#8bc8e0';
        ctx.beginPath();
        ctx.ellipse(p.x+p.w/2, botY, p.w*0.6, 20, 0, 0, Math.PI*2);
        ctx.fill();
      });
    }

    function drawJet() {
      // Trail
      jet.trail.forEach((t,i) => {
        const s = (jet.trail.length-i)/jet.trail.length;
        ctx.beginPath();
        ctx.arc(t.x-8,t.y,3*s,0,Math.PI*2);
        ctx.fillStyle = `rgba(247,169,74,${t.a*s*0.7})`;
        ctx.fill();
      });
      // Particles (engine exhaust)
      particles.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
        ctx.fillStyle = `rgba(200,160,80,${p.life*0.6})`;
        ctx.fill();
      });
      // Jet body
      ctx.save();
      ctx.translate(jet.x, jet.y);
      ctx.rotate(jet.angle);
      // Body
      ctx.fillStyle = boosting ? '#7c6af7' : '#e0e8f0';
      ctx.beginPath();
      ctx.moveTo(20,0); ctx.lineTo(-15,8); ctx.lineTo(-8,0); ctx.lineTo(-15,-8); ctx.closePath();
      ctx.fill();
      // Wing
      ctx.fillStyle = '#b0c8e0';
      ctx.beginPath();
      ctx.moveTo(0,0); ctx.lineTo(-10,18); ctx.lineTo(-14,18); ctx.lineTo(-8,0); ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(0,0); ctx.lineTo(-10,-18); ctx.lineTo(-14,-18); ctx.lineTo(-8,0); ctx.closePath();
      ctx.fill();
      // Cockpit
      ctx.fillStyle = '#7ccef5';
      ctx.beginPath();
      ctx.ellipse(8,-1,6,4,0.2,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    }

    function draw() {
      ctx.clearRect(0,0,W,H);
      drawBackground();
      drawPipes();
      drawJet();
    }

    function loop() {
      if (gameState !== 'playing') return;
      update();
      draw();
      animId = requestAnimationFrame(loop);
    }

    function startGame(m, seed) {
      mode = m; currentSeed = seed;
      document.getElementById('start-screen').style.display = 'none';
      document.getElementById('gameover-screen').style.display = 'none';
      document.getElementById('mode-label').textContent = m === 'daily' ? 'Daily' : 'Free Play';
      gameState = 'playing';
      resize();
      initGame(seed);
      loop();
    }

    document.getElementById('playBtn').addEventListener('click', () => {
      const s = Math.floor(Math.random()*999999);
      document.getElementById('seed-display').textContent = 'Seed: '+s;
      startGame('free', s);
    });
    document.getElementById('dailyBtn').addEventListener('click', () => {
      const s = getDailySeed('flapper');
      document.getElementById('seed-display').textContent = 'Daily seed: '+s;
      startGame('daily', s);
    });
    document.getElementById('restartBtn').addEventListener('click', () => {
      document.getElementById('ss-best').textContent = best+'m';
      document.getElementById('ss-daily').textContent = dailyBest+'m';
      document.getElementById('start-screen').style.display = 'flex';
    });

    // Controls
    function startPress() { pressing = true; }
    function endPress() { pressing = false; }
    function tapBoost() {
      if (boostMeter >= 100 && !boosting) { boosting=true; boostTime=180; boostMeter=100; }
    }

    canvas.addEventListener('touchstart', e=>{ e.preventDefault(); startPress(); tapBoost(); }, {passive:false});
    canvas.addEventListener('touchend', e=>{ e.preventDefault(); endPress(); }, {passive:false});
    canvas.addEventListener('mousedown', ()=>{ startPress(); tapBoost(); });
    canvas.addEventListener('mouseup', endPress);
    document.addEventListener('keydown', e=>{ if(e.code==='Space'){e.preventDefault();startPress();tapBoost();} });
    document.addEventListener('keyup', e=>{ if(e.code==='Space') endPress(); });

    window.addEventListener('resize', resize);
    resize();
    // Initial draw
    draw();
  </script>
</body>
</html>
