<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <base href="/Airplane-Games/">
  <title>Multiplier Runner — Airplane Games</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    body { overflow: hidden; display: flex; flex-direction: column; height: 100dvh; }
    .game-wrap {
      flex: 1; position: relative; display: flex; align-items: center;
      justify-content: center; background: #0d1117; touch-action: none;
    }
    canvas { display: block; }
    #overlay {
      display: none; position: absolute; inset: 0;
      background: rgba(0,0,0,0.82); align-items: center;
      justify-content: center; z-index: 10;
    }
    #overlay.show { display: flex; }
    .card {
      background: #1e1e2e; border: 1px solid #333; border-radius: 16px;
      padding: 32px; text-align: center; max-width: 320px; width: 88%;
    }
    .card h2 { margin: 0 0 8px; font-size: 1.8rem; }
    .big-num { font-size: 3rem; font-weight: 800; color: #7c3aed; margin: 12px 0; }
    .sub { color: #888; font-size: 0.9rem; margin: 4px 0; }
    .btn-row { display: flex; gap: 12px; margin-top: 20px; justify-content: center; flex-wrap: wrap; }
    .btn-dark { background: #333; }
  </style>
</head>
<body>
<header class="game-header">
  <a href="/Airplane-Games/" class="btn btn-back">← Hub</a>
  <h1 class="game-title">Multiplier Runner</h1>
  <div class="score-display" id="score-display">Best: 0</div>
</header>

<div class="game-wrap" id="wrap">
  <canvas id="c"></canvas>
  <div id="overlay" class="show">
    <div class="card" id="card">
      <h2>Multiplier Runner</h2>
      <p class="sub">Steer your crowd through the good gate!</p>
      <p class="sub" style="margin-top:8px; color:#22c55e">Green/Blue = grow</p>
      <p class="sub" style="color:#ef4444">Red/Orange = shrink</p>
      <p class="sub" style="margin-top:8px">Drag left/right to move</p>
      <div class="btn-row">
        <button class="btn" id="startBtn">Play</button>
      </div>
    </div>
  </div>
</div>

<script src="js/shared.js"></script>
<script>
'use strict';

const GAME_ID = 'multiplier-runner';
// Logical canvas (portrait)
const LW = 360, LH = 620;
const ROAD_X = 50, ROAD_W = 260;
const GATE_H = 72, GATE_GAP = 6;
const PLAYER_Y = Math.floor(LH * 0.80);
const GOAL_DIST = 4000;

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('wrap');
let scale = 1;

function resize() {
  const ww = wrap.clientWidth, wh = wrap.clientHeight;
  scale = Math.min(ww / LW, wh / LH);
  canvas.width = LW; canvas.height = LH;
  canvas.style.width  = (LW * scale) + 'px';
  canvas.style.height = (LH * scale) + 'px';
}
window.addEventListener('resize', resize);
resize();

// ── Operations ──────────────────────────────────────────────
const GOOD = [
  { label: '×2',  apply: n => n * 2,                       color: '#22c55e' },
  { label: '×3',  apply: n => n * 3,                       color: '#16a34a' },
  { label: '+10', apply: n => n + 10,                      color: '#3b82f6' },
  { label: '+15', apply: n => n + 15,                      color: '#2563eb' },
  { label: '+5',  apply: n => n + 5,                       color: '#06b6d4' },
];
const BAD = [
  { label: '÷2',  apply: n => Math.max(1, Math.floor(n / 2)), color: '#ef4444' },
  { label: '-5',  apply: n => Math.max(0, n - 5),             color: '#dc2626' },
  { label: '-10', apply: n => Math.max(0, n - 10),            color: '#b91c1c' },
  { label: '÷3',  apply: n => Math.max(1, Math.floor(n / 3)), color: '#f97316' },
];

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

// ── Game state ───────────────────────────────────────────────
let G, rafId, running = false;

function newGame() {
  G = {
    crowd: 10,
    dist: 0,
    time: 0,
    speed: 2.8,
    playerX: LW / 2,
    targetX: LW / 2,
    pairs: [],
    particles: [],
    roadOffset: 0,
    nextGate: 260,
    over: false,
    won: false,
  };
  // Pre-seed a few pairs on screen
  G.pairs.push(makePair(LH * 0.28));
  G.pairs.push(makePair(LH * 0.02));
  G.pairs.push(makePair(-GATE_H - 10));
}

function makePair(y) {
  const goodLeft = Math.random() < 0.5;
  return {
    y: (y !== undefined) ? y : -GATE_H - 10,
    left:  goodLeft ? pick(GOOD) : pick(BAD),
    right: goodLeft ? pick(BAD)  : pick(GOOD),
    triggered: false,
    flashLeft: 0,
    flashRight: 0,
  };
}

// ── Update ───────────────────────────────────────────────────
function update() {
  if (G.over) return;
  G.time++;
  G.speed = Math.min(6.5, 2.8 + G.dist / 1600);
  G.dist += G.speed;
  G.roadOffset = (G.roadOffset + G.speed) % 60;

  // Smooth player follow (clamped to road)
  G.playerX += (G.targetX - G.playerX) * 0.16;
  G.playerX = Math.max(ROAD_X + 18, Math.min(ROAD_X + ROAD_W - 18, G.playerX));

  // Spawn gates
  G.nextGate -= G.speed;
  if (G.nextGate <= 0) {
    G.pairs.push(makePair());
    G.nextGate = 190 + Math.random() * 160;
  }

  // Update pairs
  for (let i = G.pairs.length - 1; i >= 0; i--) {
    const p = G.pairs[i];
    p.y += G.speed;
    if (p.flashLeft  > 0) p.flashLeft--;
    if (p.flashRight > 0) p.flashRight--;

    // Trigger when gate passes through player row
    if (!p.triggered && p.y + GATE_H > PLAYER_Y - 6 && p.y < PLAYER_Y + 6) {
      p.triggered = true;
      const roadMid = ROAD_X + ROAD_W / 2;
      const inLeft  = G.playerX < roadMid;
      const op = inLeft ? p.left : p.right;
      G.crowd = op.apply(G.crowd);
      const bx = inLeft
        ? ROAD_X + ROAD_W * 0.25
        : ROAD_X + ROAD_W * 0.75;
      burst(bx, PLAYER_Y - 22, op.color, op.label);
      if (inLeft) p.flashLeft = 18; else p.flashRight = 18;
      if (G.crowd <= 0) { G.over = true; G.won = false; endGame(); }
    }

    if (p.y > LH + 10) G.pairs.splice(i, 1);
  }

  // Particles
  for (let i = G.particles.length - 1; i >= 0; i--) {
    const p = G.particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.12;
    p.life--;
    if (p.life <= 0) G.particles.splice(i, 1);
  }

  if (G.dist >= GOAL_DIST) { G.over = true; G.won = true; endGame(); }
}

function burst(x, y, color, label) {
  G.particles.push({ x, y: y - 8, vx: 0, vy: -2.8, color, label, life: 50, isLabel: true });
  for (let i = 0; i < 10; i++) {
    const a = Math.random() * Math.PI * 2, s = 1.5 + Math.random() * 3;
    G.particles.push({
      x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 1.5,
      color, life: 26, r: 3 + Math.random() * 2, isLabel: false,
    });
  }
}

// ── Draw ─────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, LW, LH);

  // Sky background
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, LW, LH);

  // Off-road shoulder
  ctx.fillStyle = '#111620';
  ctx.fillRect(0, 0, ROAD_X, LH);
  ctx.fillRect(ROAD_X + ROAD_W, 0, LW - ROAD_X - ROAD_W, LH);

  // Road surface
  ctx.fillStyle = '#1c2333';
  ctx.fillRect(ROAD_X, 0, ROAD_W, LH);

  // Road edge lines
  ctx.strokeStyle = 'rgba(255,255,255,0.18)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(ROAD_X, 0);           ctx.lineTo(ROAD_X, LH);
  ctx.moveTo(ROAD_X + ROAD_W, 0); ctx.lineTo(ROAD_X + ROAD_W, LH);
  ctx.stroke();

  // Dashed center line (scrolling)
  ctx.strokeStyle = 'rgba(255,255,255,0.10)';
  ctx.lineWidth = 2;
  ctx.setLineDash([16, 20]);
  ctx.beginPath();
  const midX = ROAD_X + ROAD_W / 2;
  for (let y = -(G.roadOffset % 36); y < LH; y += 36) {
    ctx.moveTo(midX, y);
    ctx.lineTo(midX, y + 16);
  }
  ctx.stroke();
  ctx.setLineDash([]);

  // Progress bar (top of road)
  const prog = Math.min(G.dist / GOAL_DIST, 1);
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.fillRect(ROAD_X, 2, ROAD_W, 5);
  ctx.fillStyle = '#a78bfa';
  ctx.fillRect(ROAD_X, 2, ROAD_W * prog, 5);

  // Gate pairs
  for (const p of G.pairs) drawPair(p);

  // Crowd + player
  drawCrowd(G.playerX, PLAYER_Y, G.crowd);

  // Particles
  for (const p of G.particles) {
    if (p.isLabel) {
      ctx.globalAlpha = Math.min(1, p.life / 18);
      ctx.fillStyle = p.color;
      ctx.font = 'bold 20px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.label, p.x, p.y);
      ctx.textBaseline = 'alphabetic';
      ctx.globalAlpha = 1;
    } else {
      ctx.globalAlpha = Math.max(0, p.life / 26);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalAlpha = 1;
    }
  }
}

function drawPair(p) {
  const gw = (ROAD_W - GATE_GAP) / 2;
  const lx = ROAD_X;
  const rx = ROAD_X + gw + GATE_GAP;

  function gate(x, w, op, flash) {
    ctx.globalAlpha = flash ? 1 : 0.90;
    ctx.fillStyle = flash ? '#ffffff' : op.color;
    rrect(ctx, x, p.y, w, GATE_H, 8);
    ctx.fill();
    ctx.globalAlpha = 1;

    ctx.strokeStyle = op.color;
    ctx.lineWidth = flash ? 3 : 1.5;
    rrect(ctx, x, p.y, w, GATE_H, 8);
    ctx.stroke();

    ctx.fillStyle = flash ? op.color : '#fff';
    ctx.font = 'bold 24px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(op.label, x + w / 2, p.y + GATE_H / 2);
    ctx.textBaseline = 'alphabetic';
  }

  gate(lx, gw, p.left,  p.flashLeft  > 0);
  gate(rx, gw, p.right, p.flashRight > 0);
}

function rrect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);     ctx.arcTo(x + w, y,     x + w, y + r,     r);
  ctx.lineTo(x + w, y + h - r); ctx.arcTo(x + w, y + h, x + w - r, y + h, r);
  ctx.lineTo(x + r, y + h);     ctx.arcTo(x,     y + h, x,     y + h - r, r);
  ctx.lineTo(x, y + r);         ctx.arcTo(x,     y,     x + r, y,         r);
  ctx.closePath();
}

function drawCrowd(cx, cy, count) {
  const vis = Math.min(count, 55);
  const perRing = 10;
  const ringColors = ['#a78bfa', '#7c3aed', '#4c1d95'];

  for (let i = 0; i < vis; i++) {
    const ring    = Math.floor(i / perRing);
    const pos     = i % perRing;
    const ringN   = Math.min(perRing, vis - ring * perRing);
    const dir     = ring % 2 === 0 ? 1 : -1;
    const angle   = (pos / ringN) * Math.PI * 2 + G.time * 0.018 * dir;
    const r       = 18 + ring * 13;
    ctx.fillStyle = ringColors[Math.min(ring, 2)];
    ctx.beginPath();
    ctx.arc(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r, 5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Centre glow
  const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 20);
  grd.addColorStop(0, '#c4b5fd');
  grd.addColorStop(1, 'rgba(124,58,237,0)');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(cx, cy, 20, 0, Math.PI * 2); ctx.fill();

  // Count label
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(count > 9999 ? '9999+' : String(count), cx, cy);
  ctx.textBaseline = 'alphabetic';
}

// ── End / overlay ────────────────────────────────────────────
function endGame() {
  const rec  = Scores.get(GAME_ID);
  const prev = rec ? rec.score : 0;
  Scores.set(GAME_ID, G.crowd);
  const best = Math.max(G.crowd, prev);
  document.getElementById('score-display').textContent = 'Best: ' + best;

  document.getElementById('card').innerHTML = `
    <h2>${G.won ? '🏆 Finish!' : '💀 Game Over'}</h2>
    <div class="big-num">${G.crowd}</div>
    <p class="sub">Final crowd size</p>
    <p class="sub" style="color:#666">Best: ${best}</p>
    <div class="btn-row">
      <button class="btn" onclick="startGame()">Play Again</button>
      <button class="btn btn-dark" onclick="location.href='/Airplane-Games/'">← Hub</button>
    </div>`;
  document.getElementById('overlay').classList.add('show');
}

// ── Input ────────────────────────────────────────────────────
function toLogicalX(clientX) {
  const r = canvas.getBoundingClientRect();
  return (clientX - r.left) / scale;
}

wrap.addEventListener('mousemove', e => {
  if (!running) return;
  G.targetX = toLogicalX(e.clientX);
});
wrap.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!running) return;
  G.targetX = toLogicalX(e.touches[0].clientX);
}, { passive: false });
wrap.addEventListener('touchstart', e => {
  e.preventDefault();
  if (!running) return;
  G.targetX = toLogicalX(e.touches[0].clientX);
}, { passive: false });

document.getElementById('startBtn').addEventListener('click', startGame);

function startGame() {
  document.getElementById('overlay').classList.remove('show');
  newGame();
  running = true;
  if (rafId) cancelAnimationFrame(rafId);
  loop();
}

function loop() {
  update();
  draw();
  rafId = requestAnimationFrame(loop);
}

// Init best score display
const _rec = Scores.get(GAME_ID);
document.getElementById('score-display').textContent = 'Best: ' + (_rec ? _rec.score : 0);
</script>
</body>
</html>
