<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="description" content="Lane Shooter – Survive waves of enemies">
  <base href="/Airplane-Games/">
  <title>Lane Shooter - Airplane Games</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    body {
      background: var(--bg-deep);
      color: var(--text-primary);
      font-family: 'Inter', system-ui, sans-serif;
      min-height: 100vh;
      overflow: hidden;
    }

    .game-wrapper {
      position: relative;
      width: 100%;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem;
      background: rgba(0, 0, 0, 0.3);
      border-bottom: 1px solid var(--border-subtle);
      z-index: 10;
    }

    .back-button {
      width: 2.2rem;
      height: 2.2rem;
      border-radius: 50%;
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .back-button:hover {
      background: var(--bg-hover);
      transform: translateX(-3px);
    }

    .hud-title {
      font-weight: 700;
      font-size: 1rem;
    }

    .hud-stats {
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    .stat {
      text-align: center;
    }

    .stat-label {
      font-size: 0.7rem;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--accent-primary);
    }

    #canvas {
      flex: 1;
      display: block;
      background: linear-gradient(180deg, rgba(50, 100, 150, 0.2) 0%, rgba(30, 50, 80, 0.3) 100%);
      cursor: crosshair;
    }

    .game-over-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 100;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .game-over-overlay.active {
      display: flex;
    }

    .game-over-card {
      background: var(--bg-elevated);
      border: 2px solid var(--border-subtle);
      border-radius: 1rem;
      padding: 2rem;
      text-align: center;
      max-width: 400px;
    }

    .game-over-card h2 {
      font-size: 2rem;
      margin: 0 0 1rem;
      color: var(--accent-primary);
    }

    .final-score {
      font-size: 2.5rem;
      font-weight: 700;
      color: #3498db;
      margin: 1rem 0;
    }

    .game-over-card p {
      color: var(--text-dim);
      margin: 1rem 0;
    }

    .button-group {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
      justify-content: center;
    }

    .btn {
      padding: 0.75rem 1.5rem;
      border: none;
      border-radius: 0.5rem;
      font-family: 'Inter', system-ui, sans-serif;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-primary) 0%, #7c3aed 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(159, 122, 234, 0.4);
    }

    .btn-secondary {
      background: var(--bg-hover);
      color: var(--text-primary);
      border: 1px solid var(--border-subtle);
    }

    .btn-secondary:hover {
      background: var(--border-subtle);
    }

    @media (max-width: 600px) {
      .hud {
        padding: 0.75rem;
      }

      .hud-stats {
        gap: 1rem;
      }

      .stat-value {
        font-size: 1.2rem;
      }
    }
  </style>
  <script src="js/shared.js" defer></script>
</head>
<body>
  <div class="game-wrapper">
    <div class="hud">
      <button class="back-button" onclick="window.history.back()" title="Back">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>
      <div class="hud-title">LANE SHOOTER</div>
      <div class="hud-stats">
        <div class="stat">
          <div class="stat-label">Score</div>
          <div class="stat-value" id="score">0</div>
        </div>
        <div class="stat">
          <div class="stat-label">Wave</div>
          <div class="stat-value" id="wave">1</div>
        </div>
      </div>
    </div>
    <canvas id="canvas"></canvas>
  </div>

  <div class="game-over-overlay" id="gameOverOverlay">
    <div class="game-over-card">
      <h2>Game Over!</h2>
      <p id="gameOverMessage">You survived for a great run!</p>
      <div class="final-score" id="finalScore">0</div>
      <p id="bestScore"></p>
      <div class="button-group">
        <button class="btn btn-primary" onclick="location.reload()">Play Again</button>
        <button class="btn btn-secondary" onclick="window.history.back()">Back to Hub</button>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight - 70;
    canvas.style.maxWidth = '100vw';
    canvas.style.maxHeight = '100vh';

    const GAME_ID = 'lane-shooter';
    const NUM_LANES = 3;
    const LANE_WIDTH = canvas.width / NUM_LANES;
    const CANNON_SIZE = 20;

    let gameState = {
      score: 0,
      wave: 1,
      health: 3,
      cannonX: canvas.width / 2,
      gameActive: true,
      gameOver: false,
      finalScore: 0,
      shootCooldown: 0,
      powerUpCooldown: 0
    };

    const enemies = [];
    const bullets = [];
    const explosions = [];
    const powerUps = [];
    let nextEnemyId = 0;
    let nextBulletId = 0;

    let waveStartTime = Date.now();
    let enemySpawnRate = 1500;

    // Load best score
    function loadBestScore() {
      if (typeof Scores !== 'undefined') {
        const record = Scores.get(GAME_ID);
        if (record && record.score > 0) {
          return record.score;
        }
      }
      return 0;
    }

    // Save score
    function saveScore(score) {
      if (typeof Scores !== 'undefined') {
        Scores.set(GAME_ID, score);
      }
    }

    // Enemy class
    class Enemy {
      constructor(lane) {
        this.id = nextEnemyId++;
        this.lane = lane;
        this.x = lane * LANE_WIDTH + LANE_WIDTH / 2;
        this.y = -20;
        this.speed = 2 + gameState.wave * 0.3;
        this.size = 15;
        this.health = 1;
      }

      draw() {
        ctx.fillStyle = '#e74c3c';
        ctx.shadowColor = '#e74c3c';
        ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        ctx.strokeStyle = '#c0392b';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.stroke();
      }

      update() {
        this.y += this.speed;
      }
    }

    // Bullet class
    class Bullet {
      constructor(x, y) {
        this.id = nextBulletId++;
        this.x = x;
        this.y = y;
        this.speed = 6;
        this.size = 5;
      }

      draw() {
        ctx.fillStyle = '#3498db';
        ctx.shadowColor = '#3498db';
        ctx.shadowBlur = 10;
        ctx.fillRect(this.x - this.size / 2, this.y - this.size, this.size, this.size * 2);
        ctx.shadowBlur = 0;
      }

      update() {
        this.y -= this.speed;
      }
    }

    // Explosion class
    class Explosion {
      constructor(x, y) {
        this.x = x;
        this.y = y;
        this.life = 1;
        this.radius = 20;
      }

      update() {
        this.life -= 0.15;
      }

      draw() {
        ctx.globalAlpha = this.life * 0.7;
        ctx.fillStyle = '#f39c12';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius * (1 - this.life), 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = '#e67e22';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius * (0.5 + this.life * 0.5), 0, Math.PI * 2);
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
    }

    // Power-up class
    class PowerUp {
      constructor(x, y, type) {
        this.x = x;
        this.y = y;
        this.type = type; // 'rapidFire' or 'shield'
        this.size = 10;
        this.speed = 1;
      }

      draw() {
        const color = this.type === 'rapidFire' ? '#f39c12' : '#9b59b6';
        ctx.fillStyle = color;
        ctx.shadowColor = color;
        ctx.shadowBlur = 10;
        ctx.fillRect(this.x - this.size, this.y - this.size, this.size * 2, this.size * 2);
        ctx.shadowBlur = 0;
      }

      update() {
        this.y += this.speed;
      }
    }

    // Handle mouse/touch movement
    document.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      // Constrain cannon to lanes
      const mouseX = e.clientX - rect.left;
      const lane = Math.floor(mouseX / LANE_WIDTH);
      gameState.cannonX = Math.max(0, Math.min(NUM_LANES - 1, lane)) * LANE_WIDTH + LANE_WIDTH / 2;
    });

    canvas.addEventListener('touchmove', (e) => {
      const touch = e.touches[0];
      const rect = canvas.getBoundingClientRect();
      const touchX = touch.clientX - rect.left;
      const lane = Math.floor(touchX / LANE_WIDTH);
      gameState.cannonX = Math.max(0, Math.min(NUM_LANES - 1, lane)) * LANE_WIDTH + LANE_WIDTH / 2;
      e.preventDefault();
    });

    // Shoot on click
    document.addEventListener('click', () => {
      if (gameState.gameActive && gameState.shootCooldown <= 0) {
        bullets.push(new Bullet(gameState.cannonX, canvas.height - CANNON_SIZE * 2 - 10));
        gameState.shootCooldown = 200;
      }
    });

    canvas.addEventListener('touchstart', () => {
      if (gameState.gameActive && gameState.shootCooldown <= 0) {
        bullets.push(new Bullet(gameState.cannonX, canvas.height - CANNON_SIZE * 2 - 10));
        gameState.shootCooldown = 200;
      }
    });

    // Spawn enemies
    let lastEnemySpawn = Date.now();
    function spawnEnemies() {
      const now = Date.now();
      if (now - lastEnemySpawn > enemySpawnRate) {
        const lane = Math.floor(Math.random() * NUM_LANES);
        enemies.push(new Enemy(lane));
        lastEnemySpawn = now;
        enemySpawnRate = Math.max(600, 1500 - gameState.wave * 100);
      }
    }

    // Update wave
    function updateWave() {
      const elapsedSeconds = (Date.now() - waveStartTime) / 1000;
      const newWave = Math.floor(elapsedSeconds / 15) + 1;
      if (newWave > gameState.wave) {
        gameState.wave = newWave;
        if (typeof showToast !== 'undefined') {
          showToast(`Wave ${gameState.wave}!`);
        }
      }
    }

    // Update game
    function update() {
      if (!gameState.gameActive) return;

      gameState.shootCooldown--;

      // Spawn enemies
      spawnEnemies();
      updateWave();

      // Update enemies
      for (let i = enemies.length - 1; i >= 0; i--) {
        enemies[i].update();

        // Check if enemy passed bottom
        if (enemies[i].y > canvas.height) {
          gameState.health--;
          explosions.push(new Explosion(enemies[i].x, canvas.height - CANNON_SIZE * 2));
          enemies.splice(i, 1);

          if (gameState.health <= 0) {
            endGame();
          }
          continue;
        }

        // Check collision with bullets
        for (let j = bullets.length - 1; j >= 0; j--) {
          const bullet = bullets[j];
          const dx = enemies[i].x - bullet.x;
          const dy = enemies[i].y - bullet.y;
          const distance = Math.sqrt(dx * dx + dy * dy);

          if (distance < enemies[i].size + bullet.size) {
            gameState.score += 10;
            explosions.push(new Explosion(enemies[i].x, enemies[i].y));
            enemies.splice(i, 1);
            bullets.splice(j, 1);

            // Spawn power-up occasionally
            if (Math.random() > 0.7) {
              const type = Math.random() > 0.5 ? 'rapidFire' : 'shield';
              powerUps.push(new PowerUp(enemies[i].x, enemies[i].y, type));
            }
            break;
          }
        }
      }

      // Update bullets
      for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].update();
        if (bullets[i].y < 0) {
          bullets.splice(i, 1);
        }
      }

      // Update explosions
      for (let i = explosions.length - 1; i >= 0; i--) {
        explosions[i].update();
        if (explosions[i].life <= 0) {
          explosions.splice(i, 1);
        }
      }

      // Update power-ups
      for (let i = powerUps.length - 1; i >= 0; i--) {
        powerUps[i].update();

        // Check collision with cannon
        const dx = powerUps[i].x - gameState.cannonX;
        const dy = powerUps[i].y - (canvas.height - CANNON_SIZE);
        const distance = Math.sqrt(dx * dx + dy * dy);

        if (distance < 30) {
          if (powerUps[i].type === 'rapidFire') {
            gameState.shootCooldown = -500; // Rapid fire for a bit
          }
          powerUps.splice(i, 1);
        } else if (powerUps[i].y > canvas.height) {
          powerUps.splice(i, 1);
        }
      }

      // Update UI
      document.getElementById('score').textContent = gameState.score;
      document.getElementById('wave').textContent = gameState.wave;
    }

    // Draw game
    function draw() {
      // Clear canvas
      ctx.fillStyle = 'rgba(50, 100, 150, 0.15)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // Draw lane dividers
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
      ctx.lineWidth = 2;
      for (let i = 1; i < NUM_LANES; i++) {
        const x = LANE_WIDTH * i;
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, canvas.height);
        ctx.stroke();
      }

      // Draw enemies
      enemies.forEach(enemy => enemy.draw());

      // Draw bullets
      bullets.forEach(bullet => bullet.draw());

      // Draw explosions
      explosions.forEach(explosion => explosion.draw());

      // Draw power-ups
      powerUps.forEach(powerUp => powerUp.draw());

      // Draw cannon
      ctx.fillStyle = '#3498db';
      ctx.shadowColor = '#3498db';
      ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.arc(gameState.cannonX, canvas.height - CANNON_SIZE, CANNON_SIZE, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Draw cannon tip
      ctx.strokeStyle = '#2980b9';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(gameState.cannonX, canvas.height - CANNON_SIZE);
      ctx.lineTo(gameState.cannonX, canvas.height - CANNON_SIZE - 15);
      ctx.stroke();

      // Draw health
      ctx.fillStyle = gameState.health > 1 ? '#2ecc71' : '#e74c3c';
      ctx.font = 'bold 16px Inter, sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText(`Health: ${gameState.health}`, 10, 30);
    }

    function endGame() {
      gameState.gameActive = false;
      gameState.gameOver = true;
      gameState.finalScore = gameState.score;
      
      saveScore(gameState.finalScore);
      const bestScore = loadBestScore();

      const overlay = document.getElementById('gameOverOverlay');
      const message = document.getElementById('gameOverMessage');
      const score = document.getElementById('finalScore');
      const best = document.getElementById('bestScore');

      message.textContent = `You survived ${gameState.wave} waves!`;
      score.textContent = gameState.finalScore;
      best.textContent = `Best: ${bestScore}`;
      overlay.classList.add('active');
    }

    // Game loop
    function gameLoop() {
      update();
      draw();
      if (gameState.gameActive) {
        requestAnimationFrame(gameLoop);
      }
    }

    gameLoop();

    // Handle window resize
    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight - 70;
    });
  </script>
</body>
</html>
