<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <base href="/Airplane-Games/">
  <title>Lane Shooter — Airplane Games</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    body { overflow: hidden; display: flex; flex-direction: column; height: 100dvh; }
    .game-wrap {
      flex: 1; position: relative; display: flex; align-items: center;
      justify-content: center; background: #06080f; touch-action: none;
    }
    canvas { display: block; }
    #overlay {
      display: none; position: absolute; inset: 0;
      background: rgba(0,0,0,0.85); align-items: center;
      justify-content: center; z-index: 10;
    }
    #overlay.show { display: flex; }
    .card {
      background: #1a1a2e; border: 1px solid #333; border-radius: 14px;
      padding: 28px; text-align: center; max-width: 320px; width: 88%;
    }
    .card h2 { margin: 0 0 8px; font-size: 1.8rem; }
    .big-num { font-size: 3rem; font-weight: 800; color: #3b82f6; margin: 12px 0; }
    .sub  { color: #888; font-size: 0.9rem; margin: 4px 0; }
    .btn-row { display: flex; gap: 12px; margin-top: 20px; justify-content: center; flex-wrap: wrap; }
    .btn-dark { background: #333; }
  </style>
</head>
<body>
<header class="game-header">
  <a href="/Airplane-Games/" class="btn btn-back">← Hub</a>
  <h1 class="game-title">Lane Shooter</h1>
  <div class="score-display" id="score-display">Best: 0</div>
</header>

<div class="game-wrap" id="wrap">
  <canvas id="c"></canvas>
  <div id="overlay" class="show">
    <div class="card" id="card">
      <h2>Lane Shooter</h2>
      <p class="sub">Shoot enemies before they reach you!</p>
      <p class="sub" style="margin-top:8px">← → arrows or tap a lane to move</p>
      <p class="sub">Cannon auto-fires — collect power-ups!</p>
      <div class="btn-row">
        <button class="btn" id="startBtn">Play</button>
      </div>
    </div>
  </div>
</div>

<script src="js/shared.js"></script>
<script>
'use strict';

const GAME_ID = 'lane-shooter';
const LW = 360, LH = 620;
const NLANES = 5;
const LANE_W = LW / NLANES;          // 72px
const CANNON_Y = LH - 52;
const BULLET_R = 5;

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('wrap');
let scale = 1;

function resize() {
  const ww = wrap.clientWidth, wh = wrap.clientHeight;
  scale = Math.min(ww / LW, wh / LH);
  canvas.width = LW; canvas.height = LH;
  canvas.style.width  = (LW * scale) + 'px';
  canvas.style.height = (LH * scale) + 'px';
}
window.addEventListener('resize', resize);
resize();

function laneX(l) { return LANE_W * l + LANE_W / 2; }

// ── Game state ───────────────────────────────────────────────
let G, rafId, running = false;

function newGame() {
  G = {
    lane: 2,
    score: 0,
    wave: 1,
    hp: 3,
    fireTimer: 0,
    fireCd: 26,         // frames between auto-shots
    waveKills: 0,
    waveGoal: 12,
    enemies: [],
    bullets: [],
    particles: [],
    powerUps: [],
    shieldUp: false,
    rapidLeft: 0,       // frames of rapid-fire remaining
    time: 0,
    spawnTimer: 0,
    spawnCd: 80,
    over: false,
  };
}

// ── Spawning ─────────────────────────────────────────────────
function spawnEnemy() {
  const lane    = Math.floor(Math.random() * NLANES);
  const armored = G.wave >= 3 && Math.random() < 0.22;
  const fast    = G.wave >= 2 && Math.random() < 0.20;
  G.enemies.push({
    lane, x: laneX(lane), y: -22,
    hp:    armored ? 3 : 1,
    maxHp: armored ? 3 : 1,
    speed: (fast ? 3.2 : 1.8) + G.wave * 0.22,
    r:     armored ? 22 : 18,
    color: armored ? '#f97316' : fast ? '#e879f9' : '#ef4444',
    fast,
  });
}

function tryDropPowerUp(x, y) {
  if (Math.random() > 0.28) return;
  const types = ['rapid', 'wide', 'hp'];
  G.powerUps.push({
    x, y,
    type: types[Math.floor(Math.random() * types.length)],
    speed: 1.4, r: 12,
  });
}

function powerColor(t) {
  return t === 'rapid' ? '#fbbf24' : t === 'wide' ? '#60a5fa' : '#a78bfa';
}

// ── Update ───────────────────────────────────────────────────
function update() {
  if (G.over) return;
  G.time++;

  const cd = G.rapidLeft > 0 ? Math.ceil(G.fireCd / 3) : G.fireCd;
  G.fireTimer++;
  if (G.fireTimer >= cd) {
    G.fireTimer = 0;
    G.bullets.push({ x: laneX(G.lane), y: CANNON_Y - 22 });
    if (G.rapidLeft > 0) G.rapidLeft--;
  }

  // Spawn enemies
  G.spawnTimer++;
  if (G.spawnTimer >= G.spawnCd) {
    G.spawnTimer = 0;
    spawnEnemy();
    G.spawnCd = Math.max(28, 80 - G.wave * 7);
  }

  // Move bullets + collision
  for (let i = G.bullets.length - 1; i >= 0; i--) {
    const b = G.bullets[i];
    b.y -= 11;
    if (b.y < -12) { G.bullets.splice(i, 1); continue; }
    let hit = false;
    for (let j = G.enemies.length - 1; j >= 0; j--) {
      const e = G.enemies[j];
      if (Math.abs(b.x - e.x) < e.r + BULLET_R && Math.abs(b.y - e.y) < e.r + BULLET_R) {
        e.hp--;
        burst(b.x, b.y, '#fde68a', 5);
        G.bullets.splice(i, 1);
        hit = true;
        if (e.hp <= 0) {
          G.score += e.fast ? 30 : e.maxHp > 1 ? 20 : 10;
          G.waveKills++;
          burst(e.x, e.y, e.color, 14);
          tryDropPowerUp(e.x, e.y);
          G.enemies.splice(j, 1);
          checkWave();
        }
        break;
      }
    }
    if (hit) continue;
  }

  // Move enemies
  for (let i = G.enemies.length - 1; i >= 0; i--) {
    const e = G.enemies[i];
    e.y += e.speed;
    if (e.y > LH + e.r) {
      if (G.shieldUp) {
        G.shieldUp = false;
        showToast('Shield blocked a hit!');
      } else {
        G.hp--;
        burst(e.x, CANNON_Y, '#ef4444', 16);
        if (G.hp <= 0) { G.enemies.splice(i, 1); G.over = true; endGame(); return; }
      }
      G.enemies.splice(i, 1);
    }
  }

  // Move power-ups
  const canX = laneX(G.lane);
  for (let i = G.powerUps.length - 1; i >= 0; i--) {
    const p = G.powerUps[i];
    p.y += p.speed;
    if (Math.abs(p.x - canX) < 44 && Math.abs(p.y - CANNON_Y) < 44) {
      applyPowerUp(p.type);
      burst(p.x, p.y, powerColor(p.type), 10);
      G.powerUps.splice(i, 1);
    } else if (p.y > LH + 20) {
      G.powerUps.splice(i, 1);
    }
  }

  // Particles
  for (let i = G.particles.length - 1; i >= 0; i--) {
    const p = G.particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.10;
    p.life--;
    if (p.life <= 0) G.particles.splice(i, 1);
  }
}

function checkWave() {
  if (G.waveKills >= G.waveGoal) {
    G.wave++;
    G.waveKills = 0;
    G.waveGoal  = 12 + G.wave * 5;
    showToast('Wave ' + G.wave + '!');
  }
}

function applyPowerUp(type) {
  if (type === 'rapid') {
    G.rapidLeft = 140;
    showToast('Rapid Fire!');
  } else if (type === 'wide') {
    for (let l = 0; l < NLANES; l++)
      G.bullets.push({ x: laneX(l), y: CANNON_Y - 22 });
    showToast('Wide Shot!');
  } else {
    if (G.hp < 3) { G.hp++; showToast('+1 Life!'); }
    else { G.shieldUp = true; showToast('Shield up!'); }
  }
}

function burst(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2, s = 1 + Math.random() * 4;
    G.particles.push({
      x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 1.5,
      color, life: 18 + Math.random() * 14, r: 2 + Math.random() * 3,
    });
  }
}

// ── Draw ─────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, LW, LH);

  // Lane stripes
  for (let l = 0; l < NLANES; l++) {
    ctx.fillStyle = l % 2 === 0 ? '#090d1a' : '#0c1122';
    ctx.fillRect(l * LANE_W, 0, LANE_W, LH);
  }

  // Active lane highlight
  ctx.fillStyle = 'rgba(59,130,246,0.09)';
  ctx.fillRect(G.lane * LANE_W, 0, LANE_W, LH);

  // Lane dividers
  ctx.strokeStyle = '#1e293b';
  ctx.lineWidth = 1;
  for (let l = 1; l < NLANES; l++) {
    ctx.beginPath();
    ctx.moveTo(l * LANE_W, 0); ctx.lineTo(l * LANE_W, LH);
    ctx.stroke();
  }

  // Danger zone at bottom
  ctx.fillStyle = '#1a0505';
  ctx.fillRect(0, CANNON_Y - 28, LW, LH - CANNON_Y + 28);
  ctx.strokeStyle = '#3b1111';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, CANNON_Y - 28); ctx.lineTo(LW, CANNON_Y - 28);
  ctx.stroke();

  // Power-ups
  for (const p of G.powerUps) {
    const col = powerColor(p.type);
    ctx.shadowColor = col; ctx.shadowBlur = 10;
    ctx.fillStyle = col + 'bb';
    ctx.strokeStyle = col;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 8px monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText({ rapid: 'FAST', wide: 'WIDE', hp: 'HP' }[p.type], p.x, p.y);
    ctx.textBaseline = 'alphabetic';
  }

  // Enemies
  for (const e of G.enemies) {
    ctx.shadowColor = e.color; ctx.shadowBlur = 8;
    ctx.fillStyle = e.color;
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    // HP pips
    if (e.maxHp > 1) {
      for (let h = 0; h < e.maxHp; h++) {
        ctx.fillStyle = h < e.hp ? '#fff' : 'rgba(255,255,255,0.25)';
        ctx.beginPath();
        ctx.arc(e.x - (e.maxHp - 1) * 5 + h * 10, e.y + e.r + 5, 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    // Eyes
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.beginPath(); ctx.arc(e.x - 5, e.y - 4, 4, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(e.x + 5, e.y - 4, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(e.x - 5, e.y - 4, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(e.x + 5, e.y - 4, 2, 0, Math.PI * 2); ctx.fill();
  }

  // Bullets
  ctx.shadowColor = '#93c5fd'; ctx.shadowBlur = 8;
  ctx.fillStyle = '#93c5fd';
  for (const b of G.bullets) {
    ctx.beginPath(); ctx.arc(b.x, b.y, BULLET_R, 0, Math.PI * 2); ctx.fill();
  }
  ctx.shadowBlur = 0;

  // Cannon
  const cx = laneX(G.lane);
  if (G.shieldUp) {
    ctx.strokeStyle = 'rgba(167,139,250,0.6)'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(cx, CANNON_Y, 30, 0, Math.PI * 2); ctx.stroke();
  }
  if (G.rapidLeft > 0) {
    ctx.strokeStyle = 'rgba(251,191,36,0.5)'; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(cx, CANNON_Y, 24, 0, Math.PI * 2); ctx.stroke();
  }
  // Barrel
  ctx.fillStyle = '#1d4ed8';
  ctx.beginPath();
  ctx.rect(cx - 5, CANNON_Y - 28, 10, 20);
  ctx.fill();
  // Body
  ctx.shadowColor = '#3b82f6'; ctx.shadowBlur = 14;
  ctx.fillStyle = '#3b82f6';
  ctx.beginPath(); ctx.arc(cx, CANNON_Y, 18, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  // Tip
  ctx.fillStyle = '#93c5fd';
  ctx.beginPath(); ctx.arc(cx, CANNON_Y - 28, 5, 0, Math.PI * 2); ctx.fill();

  // HP hearts (canvas overlay)
  ctx.font = '16px sans-serif';
  ctx.textAlign = 'left';
  for (let i = 0; i < 3; i++) {
    ctx.fillStyle = i < G.hp ? '#f87171' : '#2d2d2d';
    ctx.fillText('♥', 8 + i * 22, 24);
  }

  // Score / wave
  ctx.fillStyle = '#94a3b8';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'right';
  ctx.fillText('W' + G.wave + '  ' + G.score + 'pts', LW - 8, 24);

  // Wave progress bar
  const wp = Math.min(G.waveKills / G.waveGoal, 1);
  ctx.fillStyle = '#1e293b';
  ctx.fillRect(0, LH - 4, LW, 4);
  ctx.fillStyle = '#3b82f6';
  ctx.fillRect(0, LH - 4, LW * wp, 4);

  // Particles
  for (const p of G.particles) {
    ctx.globalAlpha = Math.max(0, p.life / 30);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── End / overlay ────────────────────────────────────────────
function endGame() {
  Scores.set(GAME_ID, G.score);
  const rec  = Scores.get(GAME_ID);
  const best = rec ? rec.score : G.score;
  document.getElementById('score-display').textContent = 'Best: ' + best;

  document.getElementById('card').innerHTML = `
    <h2>Game Over!</h2>
    <div class="big-num">${G.score}</div>
    <p class="sub">Wave ${G.wave} · ${G.score} pts</p>
    <p class="sub" style="color:#666">Best: ${best}</p>
    <div class="btn-row">
      <button class="btn" onclick="startGame()">Play Again</button>
      <button class="btn btn-dark" onclick="location.href='/Airplane-Games/'">← Hub</button>
    </div>`;
  document.getElementById('overlay').classList.add('show');
}

// ── Input ────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (!running || G.over) return;
  if (e.code === 'ArrowLeft'  || e.code === 'KeyA') { G.lane = Math.max(0, G.lane - 1); e.preventDefault(); }
  if (e.code === 'ArrowRight' || e.code === 'KeyD') { G.lane = Math.min(NLANES - 1, G.lane + 1); e.preventDefault(); }
});

function tapLane(clientX) {
  const r  = canvas.getBoundingClientRect();
  const lx = (clientX - r.left) / scale;
  G.lane = Math.max(0, Math.min(NLANES - 1, Math.floor(lx / LANE_W)));
}

wrap.addEventListener('touchstart', e => {
  e.preventDefault();
  if (!running || G.over) return;
  tapLane(e.touches[0].clientX);
}, { passive: false });

wrap.addEventListener('click', e => {
  if (!running || G.over) return;
  tapLane(e.clientX);
});

document.getElementById('startBtn').addEventListener('click', startGame);

function startGame() {
  document.getElementById('overlay').classList.remove('show');
  newGame();
  running = true;
  if (rafId) cancelAnimationFrame(rafId);
  loop();
}

function loop() {
  update();
  draw();
  rafId = requestAnimationFrame(loop);
}

const _rec = Scores.get(GAME_ID);
document.getElementById('score-display').textContent = 'Best: ' + (_rec ? _rec.score : 0);
</script>
</body>
</html>
