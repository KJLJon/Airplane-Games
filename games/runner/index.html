<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <base href="/Airplane-Games/">
  <title>Crowd Runner — Airplane Games</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    body { overflow: hidden; display: flex; flex-direction: column; height: 100dvh; }
    .game-wrap {
      flex: 1; position: relative; display: flex; align-items: center;
      justify-content: center; background: #0b1012; touch-action: none;
    }
    canvas { display: block; }
    #overlay {
      display: none; position: absolute; inset: 0;
      background: rgba(0,0,0,0.84); align-items: center;
      justify-content: center; z-index: 10;
    }
    #overlay.show { display: flex; }
    .card {
      background: #1a2228; border: 1px solid #333; border-radius: 16px;
      padding: 30px; text-align: center; max-width: 320px; width: 88%;
    }
    .card h2 { margin: 0 0 8px; font-size: 1.8rem; }
    .big-num { font-size: 3rem; font-weight: 800; color: #10b981; margin: 12px 0; }
    .sub  { color: #888; font-size: 0.9rem; margin: 4px 0; }
    .btn-row { display: flex; gap: 12px; margin-top: 20px; justify-content: center; flex-wrap: wrap; }
    .btn-dark { background: #333; }
  </style>
</head>
<body>
<header class="game-header">
  <a href="/Airplane-Games/" class="btn btn-back">← Hub</a>
  <h1 class="game-title">Crowd Runner</h1>
  <div class="score-display" id="score-display">Best: 0</div>
</header>

<div class="game-wrap" id="wrap">
  <canvas id="c"></canvas>
  <div id="overlay" class="show">
    <div class="card" id="card">
      <h2>Crowd Runner</h2>
      <p class="sub">Collect followers — grow your mob!</p>
      <p class="sub" style="margin-top:8px; color:#10b981">Green dots = followers</p>
      <p class="sub" style="color:#ef4444">Red walls = crowd split</p>
      <p class="sub" style="margin-top:8px">Drag left/right to steer</p>
      <div class="btn-row">
        <button class="btn" id="startBtn">Play</button>
      </div>
    </div>
  </div>
</div>

<script src="js/shared.js"></script>
<script>
'use strict';

const GAME_ID = 'runner';
const LW = 360, LH = 620;
// Road bounds
const RX = 40, RW = 280;
const PLAYER_Y = LH * 0.78;
const GOAL_DIST = 3600;

const canvas = document.getElementById('c');
const ctx    = canvas.getContext('2d');
const wrap   = document.getElementById('wrap');
let scale = 1;

function resize() {
  const ww = wrap.clientWidth, wh = wrap.clientHeight;
  scale = Math.min(ww / LW, wh / LH);
  canvas.width = LW; canvas.height = LH;
  canvas.style.width  = (LW * scale) + 'px';
  canvas.style.height = (LH * scale) + 'px';
}
window.addEventListener('resize', resize);
resize();

// ── Game state ───────────────────────────────────────────────
let G, rafId, running = false;

function newGame() {
  G = {
    crowd: 5,
    dist: 0,
    time: 0,
    speed: 2.6,
    playerX: LW / 2,
    targetX: LW / 2,
    collectibles: [],
    walls: [],
    particles: [],
    roadOffset: 0,
    nextCollect: 120,
    nextWall: 440,
    over: false,
    won: false,
    // boss state
    boss: null,
    phase: 'run',     // 'run' | 'boss' | 'done'
  };
  // Pre-seed some collectibles
  for (let i = 0; i < 4; i++) {
    spawnCollectible(LH * 0.1 + i * LH * 0.18);
  }
}

// ── Spawning ─────────────────────────────────────────────────
function spawnCollectible(y) {
  const count = 2 + Math.floor(Math.random() * 4); // 2–5 per cluster
  const cx = RX + 20 + Math.random() * (RW - 40);
  for (let i = 0; i < count; i++) {
    G.collectibles.push({
      x: cx + (Math.random() - 0.5) * 36,
      y: (y !== undefined ? y : -20) + (Math.random() - 0.5) * 24,
      r: 7, collected: false,
      bobOffset: Math.random() * Math.PI * 2,
    });
  }
}

function spawnWall(y) {
  // Wall with a gap; gap size shrinks as difficulty increases
  const gapW = Math.max(50, 90 - Math.floor(G.dist / 600) * 6);
  const gapX = RX + 10 + Math.random() * (RW - gapW - 20);
  G.walls.push({
    y: y !== undefined ? y : -18,
    gapX, gapW,
    h: 20, triggered: false,
    flashTimer: 0,
  });
}

// ── Update ───────────────────────────────────────────────────
function update() {
  if (G.over) return;

  if (G.phase === 'boss') { updateBoss(); return; }

  G.time++;
  G.speed  = Math.min(6.0, 2.6 + G.dist / 1400);
  G.dist  += G.speed;
  G.roadOffset = (G.roadOffset + G.speed) % 50;

  // Smooth steer
  G.playerX += (G.targetX - G.playerX) * 0.16;
  G.playerX = Math.max(RX + 16, Math.min(RX + RW - 16, G.playerX));

  // Spawn collectibles
  G.nextCollect -= G.speed;
  if (G.nextCollect <= 0) {
    spawnCollectible();
    G.nextCollect = 90 + Math.random() * 110;
  }

  // Spawn walls
  G.nextWall -= G.speed;
  if (G.nextWall <= 0) {
    spawnWall();
    G.nextWall = 320 + Math.random() * 220;
  }

  // Move + collect
  for (let i = G.collectibles.length - 1; i >= 0; i--) {
    const c = G.collectibles[i];
    c.y += G.speed;
    if (c.collected) { G.collectibles.splice(i, 1); continue; }
    const dx = G.playerX - c.x;
    const dy = PLAYER_Y  - c.y;
    if (Math.sqrt(dx * dx + dy * dy) < 22) {
      c.collected = true;
      G.crowd++;
      burst(c.x, c.y, '#34d399', 7);
    }
    if (c.y > LH + 20) G.collectibles.splice(i, 1);
  }

  // Move + check walls
  for (let i = G.walls.length - 1; i >= 0; i--) {
    const w = G.walls[i];
    w.y += G.speed;
    if (w.flashTimer > 0) w.flashTimer--;

    if (!w.triggered && w.y + w.h > PLAYER_Y - 6 && w.y < PLAYER_Y + 10) {
      w.triggered = true;
      const inGap = G.playerX > w.gapX && G.playerX < w.gapX + w.gapW;
      if (!inGap) {
        const lost = Math.ceil(G.crowd * 0.45);
        G.crowd = Math.max(0, G.crowd - lost);
        burst(G.playerX, PLAYER_Y, '#ef4444', 14);
        showToast('-' + lost + ' crowd!');
        w.flashTimer = 20;
        if (G.crowd <= 0) { G.over = true; G.won = false; endGame(); return; }
      }
    }
    if (w.y > LH + 20) G.walls.splice(i, 1);
  }

  // Particles
  tickParticles();

  // Reach goal → boss phase
  if (G.dist >= GOAL_DIST) startBoss();
}

// ── Boss phase ───────────────────────────────────────────────
function startBoss() {
  G.phase = 'boss';
  // Enemies equal to crowd count (capped so it's winnable)
  const enemyCount = Math.max(3, Math.min(G.crowd + 4, 24));
  G.boss = {
    enemies: [],
    crowdLeft: G.crowd,
    attackTimer: 0,
    attackCd: 28,
    done: false,
    winTimer: 0,
  };
  // Line up enemies at top
  for (let i = 0; i < enemyCount; i++) {
    const col = i % 6, row = Math.floor(i / 6);
    G.boss.enemies.push({
      x: LW / 2 - 5 * 36 / 2 + col * 38 + 19,
      y: 60 + row * 44,
      r: 16, hp: 1, dead: false, deathTimer: 0,
    });
  }
  showToast('Boss fight! ' + enemyCount + ' enemies!');
}

function updateBoss() {
  G.time++;
  const b = G.boss;
  if (b.done) {
    b.winTimer++;
    if (b.winTimer > 60) { G.over = true; G.won = true; endGame(); }
    return;
  }

  tickParticles();

  b.attackTimer++;
  if (b.attackTimer >= b.attackCd) {
    b.attackTimer = 0;
    // One crowd member attacks one enemy
    const alive = b.enemies.filter(e => !e.dead);
    if (alive.length === 0) {
      b.done = true; return;
    }
    if (b.crowdLeft <= 0) {
      // Out of crowd — game over
      G.over = true; G.won = false; endGame(); return;
    }
    const target = alive[Math.floor(Math.random() * alive.length)];
    burst(target.x, target.y, '#34d399', 10);
    target.dead = true;
    target.deathTimer = 30;
    b.crowdLeft--;
  }

  // Advance death timers
  for (const e of b.enemies) {
    if (e.dead && e.deathTimer > 0) e.deathTimer--;
  }
  b.enemies = b.enemies.filter(e => !e.dead || e.deathTimer > 0);

  if (b.enemies.length === 0) b.done = true;
}

// ── Particles ────────────────────────────────────────────────
function burst(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2, s = 1.5 + Math.random() * 3.5;
    G.particles.push({
      x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 1.5,
      color, life: 20 + Math.random() * 15, r: 2.5 + Math.random() * 2.5,
    });
  }
}

function tickParticles() {
  for (let i = G.particles.length - 1; i >= 0; i--) {
    const p = G.particles[i];
    p.x += p.vx; p.y += p.vy; p.vy += 0.12;
    p.life--;
    if (p.life <= 0) G.particles.splice(i, 1);
  }
}

// ── Draw ─────────────────────────────────────────────────────
function draw() {
  ctx.clearRect(0, 0, LW, LH);

  if (G.phase === 'boss') { drawBoss(); return; }

  // Background
  ctx.fillStyle = '#0b1012';
  ctx.fillRect(0, 0, LW, LH);

  // Shoulder
  ctx.fillStyle = '#0f1618';
  ctx.fillRect(0, 0, RX, LH);
  ctx.fillRect(RX + RW, 0, LW - RX - RW, LH);

  // Road
  ctx.fillStyle = '#18232a';
  ctx.fillRect(RX, 0, RW, LH);

  // Road edges
  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(RX, 0);       ctx.lineTo(RX, LH);
  ctx.moveTo(RX + RW, 0); ctx.lineTo(RX + RW, LH);
  ctx.stroke();

  // Dashed center line
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 2;
  ctx.setLineDash([14, 18]);
  ctx.beginPath();
  const mx = RX + RW / 2;
  for (let y = -(G.roadOffset % 32); y < LH; y += 32) {
    ctx.moveTo(mx, y); ctx.lineTo(mx, y + 14);
  }
  ctx.stroke();
  ctx.setLineDash([]);

  // Progress bar
  const prog = Math.min(G.dist / GOAL_DIST, 1);
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.fillRect(RX, 2, RW, 5);
  ctx.fillStyle = '#10b981';
  ctx.fillRect(RX, 2, RW * prog, 5);
  // Boss marker
  ctx.fillStyle = '#ef4444';
  ctx.fillRect(RX + RW - 5, 0, 5, 9);

  // Walls
  for (const w of G.walls) {
    const flash = w.flashTimer > 0;
    ctx.fillStyle = flash ? '#ef4444' : '#dc2626cc';
    // Left segment
    ctx.fillRect(RX, w.y, w.gapX - RX, w.h);
    // Right segment
    ctx.fillRect(w.gapX + w.gapW, w.y, (RX + RW) - (w.gapX + w.gapW), w.h);
    // Gap highlight
    if (!flash) {
      ctx.fillStyle = 'rgba(16,185,129,0.12)';
      ctx.fillRect(w.gapX, w.y, w.gapW, w.h);
    }
    // Arrow in gap
    ctx.fillStyle = flash ? '#fff' : '#10b981';
    ctx.font = 'bold 11px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('↑', w.gapX + w.gapW / 2, w.y + w.h / 2);
    ctx.textBaseline = 'alphabetic';
  }

  // Collectibles
  for (const c of G.collectibles) {
    if (c.collected) continue;
    const bob = Math.sin(G.time * 0.05 + c.bobOffset) * 2;
    ctx.shadowColor = '#34d399'; ctx.shadowBlur = 8;
    ctx.fillStyle = '#34d399';
    ctx.beginPath(); ctx.arc(c.x, c.y + bob, c.r, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    // Person icon (simple stick figure dot)
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(c.x, c.y + bob - 2, 3, 0, Math.PI * 2); ctx.fill();
  }

  // Crowd around player
  drawCrowd(G.playerX, PLAYER_Y, G.crowd);

  // Particles
  drawParticles();
}

function drawBoss() {
  const b = G.boss;
  // Background
  ctx.fillStyle = '#100814';
  ctx.fillRect(0, 0, LW, LH);

  // Gradient floor
  const grd = ctx.createLinearGradient(0, LH * 0.5, 0, LH);
  grd.addColorStop(0, '#1a0820');
  grd.addColorStop(1, '#0d0510');
  ctx.fillStyle = grd;
  ctx.fillRect(0, LH * 0.5, LW, LH * 0.5);

  // Title
  ctx.fillStyle = '#ef4444';
  ctx.font = 'bold 16px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('BOSS FIGHT!', LW / 2, 34);

  // Crowd vs enemies
  ctx.fillStyle = '#94a3b8';
  ctx.font = '12px monospace';
  ctx.fillText('Your crowd: ' + b.crowdLeft + '  vs  Enemies: ' + b.enemies.filter(e => !e.dead).length, LW / 2, 52);

  // Enemies
  for (const e of b.enemies) {
    const alpha = e.dead ? Math.max(0, e.deathTimer / 30) : 1;
    ctx.globalAlpha = alpha;
    ctx.shadowColor = '#ef4444'; ctx.shadowBlur = e.dead ? 20 : 6;
    ctx.fillStyle = e.dead ? '#fbbf24' : '#ef4444';
    ctx.beginPath(); ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  // Player crowd (bottom half)
  const crowdY = LH * 0.75;
  const vis = Math.min(b.crowdLeft, 30);
  for (let i = 0; i < vis; i++) {
    const angle = (i / vis) * Math.PI * 2 + G.time * 0.025;
    const r = 14 + (i % 3) * 14;
    ctx.fillStyle = i % 3 === 0 ? '#34d399' : i % 3 === 1 ? '#10b981' : '#059669';
    ctx.beginPath();
    ctx.arc(LW / 2 + Math.cos(angle) * r, crowdY + Math.sin(angle) * r * 0.4, 6, 0, Math.PI * 2);
    ctx.fill();
  }

  // Attack line animation
  if (b.attackTimer > b.attackCd - 12) {
    const alive = b.enemies.filter(e => !e.dead);
    if (alive.length > 0) {
      const t = alive[0];
      ctx.strokeStyle = '#34d399aa';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(LW / 2, crowdY - 20);
      ctx.lineTo(t.x, t.y + 20);
      ctx.stroke();
    }
  }

  // Win/lose message
  if (b.done) {
    ctx.fillStyle = b.crowdLeft > 0 ? '#34d399' : '#ef4444';
    ctx.font = 'bold 28px monospace';
    ctx.textAlign = 'center';
    ctx.fillText(b.crowdLeft > 0 ? 'VICTORY!' : 'DEFEATED', LW / 2, LH / 2);
  }

  drawParticles();
}

function drawCrowd(cx, cy, count) {
  const vis     = Math.min(count, 52);
  const perRing = 9;
  const cols    = ['#34d399', '#10b981', '#065f46'];

  for (let i = 0; i < vis; i++) {
    const ring  = Math.floor(i / perRing);
    const pos   = i % perRing;
    const ringN = Math.min(perRing, vis - ring * perRing);
    const dir   = ring % 2 === 0 ? 1 : -1;
    const angle = (pos / ringN) * Math.PI * 2 + G.time * 0.02 * dir;
    const r     = 16 + ring * 13;
    ctx.fillStyle = cols[Math.min(ring, 2)];
    ctx.beginPath();
    ctx.arc(cx + Math.cos(angle) * r, cy + Math.sin(angle) * r, 5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Centre glow
  const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, 20);
  grd.addColorStop(0, '#6ee7b7');
  grd.addColorStop(1, 'rgba(16,185,129,0)');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(cx, cy, 20, 0, Math.PI * 2); ctx.fill();

  // Count
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 12px monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(String(count), cx, cy);
  ctx.textBaseline = 'alphabetic';
}

function drawParticles() {
  for (const p of G.particles) {
    ctx.globalAlpha = Math.max(0, p.life / 32);
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ── End / overlay ────────────────────────────────────────────
function endGame() {
  const score = G.won ? G.boss.crowdLeft : 0;
  Scores.set(GAME_ID, G.crowd);
  const rec  = Scores.get(GAME_ID);
  const best = rec ? rec.score : G.crowd;
  document.getElementById('score-display').textContent = 'Best: ' + best;

  document.getElementById('card').innerHTML = `
    <h2>${G.won ? '🏆 Victory!' : '💀 Wiped Out'}</h2>
    <div class="big-num">${G.crowd}</div>
    <p class="sub">${G.won ? 'Crowd survived: ' + G.boss.crowdLeft : 'Crowd: ' + G.crowd}</p>
    <p class="sub" style="color:#666">Best: ${best}</p>
    <div class="btn-row">
      <button class="btn" onclick="startGame()">Play Again</button>
      <button class="btn btn-dark" onclick="location.href='/Airplane-Games/'">← Hub</button>
    </div>`;
  document.getElementById('overlay').classList.add('show');
}

// ── Input ────────────────────────────────────────────────────
function toLogicalX(clientX) {
  const r = canvas.getBoundingClientRect();
  return (clientX - r.left) / scale;
}

wrap.addEventListener('mousemove', e => {
  if (!running) return;
  G.targetX = toLogicalX(e.clientX);
});
wrap.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!running) return;
  G.targetX = toLogicalX(e.touches[0].clientX);
}, { passive: false });
wrap.addEventListener('touchstart', e => {
  e.preventDefault();
  if (!running) return;
  G.targetX = toLogicalX(e.touches[0].clientX);
}, { passive: false });

document.getElementById('startBtn').addEventListener('click', startGame);

function startGame() {
  document.getElementById('overlay').classList.remove('show');
  newGame();
  running = true;
  if (rafId) cancelAnimationFrame(rafId);
  loop();
}

function loop() {
  update();
  draw();
  rafId = requestAnimationFrame(loop);
}

const _rec = Scores.get(GAME_ID);
document.getElementById('score-display').textContent = 'Best: ' + (_rec ? _rec.score : 0);
</script>
</body>
</html>
