<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <base href="/airplane-games/">
  <title>Runner — Airplane Games</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    body { overflow: hidden; display: flex; flex-direction: column; height: 100dvh; }
    .game-wrap { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; background: #0a0a1a; touch-action: none; }
    #gameCanvas { display: block; max-width: 100%; max-height: 100%; }
    .hud-overlay { position: absolute; top: 8px; left: 8px; right: 8px; display: flex; justify-content: space-between; align-items: center; pointer-events: none; }
    .lives-display { display: flex; gap: 4px; }
    .heart { font-size: 1.4rem; filter: drop-shadow(0 0 4px #ff4444); }
    .heart.empty { opacity: 0.3; }
    #dist-display { font-size: 1.2rem; font-weight: 700; color: #fff; text-shadow: 0 0 8px rgba(255,255,255,0.5); }
    .start-msg { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); text-align: center; color: #fff; pointer-events: none; }
    .start-msg h2 { font-size: 1.8rem; margin: 0 0 8px; }
    .start-msg p { font-size: 1rem; opacity: 0.8; }
    .gameover-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.75); display: flex; align-items: center; justify-content: center; }
    .gameover-overlay.hidden { display: none; }
    .gameover-box { background: var(--surface-1); border: 1px solid var(--border-subtle); border-radius: var(--radius-lg); padding: 28px; text-align: center; max-width: 300px; width: 88%; }
    .gameover-box h2 { margin: 0 0 8px; }
    .gameover-box p { color: var(--text-secondary); margin: 4px 0; }
    .gameover-box .btn { margin-top: 16px; width: 100%; }
    #touch-hint { position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%); color: rgba(255,255,255,0.5); font-size: 0.8rem; pointer-events: none; }
  </style>
</head>
<body>
<header class="game-header">
  <a href="/airplane-games/" class="btn btn-back">← Hub</a>
  <h1 class="game-title">Runner</h1>
  <div class="score-display" id="score-display">Best: 0m</div>
</header>

<div class="game-wrap" id="game-wrap">
  <canvas id="gameCanvas"></canvas>
  <div class="hud-overlay">
    <div class="lives-display" id="lives-display"></div>
    <div id="dist-display">0m</div>
  </div>
  <div id="start-overlay" class="start-msg">
    <h2>Runner</h2>
    <p>Tap or press Space to start</p>
    <p style="margin-top:8px;font-size:0.85rem;opacity:0.6">Tap = Jump &nbsp;|&nbsp; Hold Down = Duck</p>
  </div>
  <div class="gameover-overlay hidden" id="gameover-overlay">
    <div class="gameover-box">
      <h2>Game Over</h2>
      <p id="go-dist"></p>
      <p id="go-best"></p>
      <button class="btn" id="go-restart">Play Again</button>
    </div>
  </div>
  <div id="touch-hint">Tap = Jump | Hold Down = Duck</div>
</div>

<script src="js/shared.js"></script>
<script>
'use strict';

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('game-wrap');

/* ── Responsive canvas ────────────────────────────── */
const BASE_W = 480, BASE_H = 270;
let scale = 1;
function resize() {
  const ww=wrap.clientWidth, wh=wrap.clientHeight;
  scale = Math.min(ww/BASE_W, wh/BASE_H);
  canvas.width = BASE_W; canvas.height = BASE_H;
  canvas.style.width = (BASE_W*scale)+'px';
  canvas.style.height = (BASE_H*scale)+'px';
}
window.addEventListener('resize', resize);
resize();

/* ── Constants ───────────────────────────────────── */
const GROUND_Y = BASE_H - 50;
const PLAYER_X = 60;
const PLAYER_W = 28, PLAYER_H = 38;
const DUCK_H = 22;
const COIN_R = 7;
const GRAVITY = 0.6;
const JUMP_V = -12;
const DBL_JUMP_V = -10;
const MAX_SPEED = 12;
const INIT_SPEED = 5;

/* ── Game State ──────────────────────────────────── */
let G = {};

function initGame() {
  G = {
    started: false, over: false, paused: false,
    speed: INIT_SPEED, dist: 0, frameDist: 0,
    lives: 3, coins: 0, coinCount: 0,
    score: 0,
    player: { y: GROUND_Y - PLAYER_H, vy: 0, jumps: 0, ducking: false, invincible: 0, runFrame: 0, runTick: 0 },
    obstacles: [], coins: [], particles: [],
    bg: { sky: 0, mtn: 0, ground: 0 },
    nextObsDist: 200, nextCoinDist: 100,
    rng: createRNG(Date.now()>>>0)
  };
  updateLivesHUD();
  document.getElementById('dist-display').textContent = '0m';
  document.getElementById('gameover-overlay').classList.add('hidden');
  document.getElementById('start-overlay').style.display='';
  const rec=Scores.get('runner');
  document.getElementById('score-display').textContent='Best: '+(rec?rec.score+'m':'0m');
}

/* ── Obstacle / Coin Gen ────────────────────────── */
function spawnObstacle() {
  const t = G.rng.int(0,4);
  if (t<=1) {
    // Wall (duck)
    G.obstacles.push({ type:'wall', x:BASE_W+20, w:22, h:PLAYER_H-DUCK_H, y:GROUND_Y-PLAYER_H+DUCK_H, color:'#c06030' });
  } else if (t===2) {
    // Gap (jump) — draw as a darker ground section
    G.obstacles.push({ type:'gap', x:BASE_W+20, w:G.rng.int(50,80), h:GROUND_Y, y:GROUND_Y, color:'#0a0a1a' });
  } else {
    // Cactus-style obstacle
    const h=G.rng.int(22,40);
    G.obstacles.push({ type:'block', x:BASE_W+20, w:16, h, y:GROUND_Y-h, color:'#50aa50' });
  }
  G.nextObsDist = G.rng.int(Math.floor(280/G.speed*INIT_SPEED), Math.floor(500/G.speed*INIT_SPEED));
}

function spawnCoin() {
  const platformH = GROUND_Y-PLAYER_H-20;
  const y = G.rng.int(2)===0 ? GROUND_Y-30 : platformH;
  G.coins.push({ x:BASE_W+20, y, r:COIN_R, collected:false });
  G.nextCoinDist = G.rng.int(60,180);
}

/* ── Physics & Update ───────────────────────────── */
function update() {
  if (!G.started || G.over) return;
  const p = G.player;
  G.dist += G.speed/60;
  G.frameDist += G.speed;
  G.speed = Math.min(MAX_SPEED, INIT_SPEED + G.dist*0.008);
  document.getElementById('dist-display').textContent = Math.floor(G.dist)+'m';

  // BG scroll
  G.bg.ground = (G.bg.ground + G.speed) % (BASE_W*2);
  G.bg.mtn    = (G.bg.mtn    + G.speed*0.3) % (BASE_W*2);
  G.bg.sky    = (G.bg.sky    + G.speed*0.05) % (BASE_W*2);

  // Player gravity
  if (!p.ducking || p.y < GROUND_Y-PLAYER_H) {
    p.vy += GRAVITY;
    p.y += p.vy;
  }
  const groundTarget = p.ducking ? GROUND_Y-DUCK_H : GROUND_Y-PLAYER_H;
  if (p.y >= groundTarget) { p.y = groundTarget; p.vy = 0; p.jumps = 0; }

  // Run animation
  p.runTick++; if (p.runTick>=6){p.runTick=0;p.runFrame=(p.runFrame+1)%4;}

  // Invincibility timer
  if (p.invincible>0) p.invincible--;

  // Obstacle generation
  G.nextObsDist -= G.speed;
  if (G.nextObsDist<=0) spawnObstacle();

  // Coin generation
  G.nextCoinDist -= G.speed;
  if (G.nextCoinDist<=0) spawnCoin();

  // Move obstacles
  G.obstacles = G.obstacles.filter(o=>{
    o.x -= G.speed;
    return o.x > -120;
  });

  // Move coins
  G.coins = G.coins.filter(c=>{
    c.x -= G.speed;
    if (!c.collected && collidesCoin(c)) {
      c.collected = true;
      G.coinCount++;
      spawnParticles(c.x, c.y, '#ffd700', 6);
      if (G.coinCount>=100) { G.coinCount-=100; addLife(); }
      return false;
    }
    return c.x > -20;
  });

  // Check obstacle collisions
  if (p.invincible===0) {
    for (const o of G.obstacles) {
      if (collidesObstacle(o)) { takeDamage(); break; }
    }
  }

  // Particles
  G.particles = G.particles.filter(pt=>{
    pt.x+=pt.vx; pt.y+=pt.vy; pt.vy+=0.2; pt.life--;
    return pt.life>0;
  });
}

function collidesCoin(c) {
  const p=G.player;
  const ph = p.ducking?DUCK_H:PLAYER_H;
  const px=PLAYER_X, py=p.y, pw=PLAYER_W;
  return c.x+c.r>px && c.x-c.r<px+pw && c.y+c.r>py && c.y-c.r<py+ph;
}

function collidesObstacle(o) {
  const p=G.player;
  const ph=p.ducking?DUCK_H:PLAYER_H;
  const px=PLAYER_X, py=p.y, pw=PLAYER_W;
  if (o.type==='gap') {
    // Only collide if on ground level and within gap horizontally
    if (py+ph >= GROUND_Y-2 && px+pw-4>o.x && px+4<o.x+o.w) return true;
    return false;
  }
  const margin=4;
  return px+pw-margin>o.x && px+margin<o.x+o.w && py+ph-margin>o.y && py+margin<o.y+o.h;
}

function takeDamage() {
  G.lives--;
  G.player.invincible = 90;
  spawnParticles(PLAYER_X+PLAYER_W/2, G.player.y+PLAYER_H/2, '#ff4444', 12);
  updateLivesHUD();
  if (G.lives<=0) gameOver();
}

function addLife() {
  if (G.lives<3) { G.lives++; updateLivesHUD(); showToast('+1 Life!'); }
}

function gameOver() {
  G.over=true;
  const dist=Math.floor(G.dist);
  Scores.set('runner',dist);
  const rec=Scores.get('runner');
  document.getElementById('score-display').textContent='Best: '+rec.score+'m';
  document.getElementById('go-dist').textContent='Distance: '+dist+'m';
  document.getElementById('go-best').textContent='Best: '+rec.score+'m';
  document.getElementById('gameover-overlay').classList.remove('hidden');
}

function spawnParticles(x,y,color,count) {
  for (let i=0;i<count;i++) {
    const a=Math.random()*Math.PI*2, s=Math.random()*4+1;
    G.particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,color,life:30,size:Math.random()*4+2});
  }
}

function updateLivesHUD() {
  const hud=document.getElementById('lives-display');
  hud.innerHTML='';
  for (let i=0;i<3;i++) {
    const h=document.createElement('span');
    h.className='heart'+(i>=G.lives?' empty':'');
    h.textContent='♥';
    hud.appendChild(h);
  }
}

/* ── Drawing ─────────────────────────────────────── */
function drawBG() {
  // Sky gradient
  const grad=ctx.createLinearGradient(0,0,0,GROUND_Y);
  grad.addColorStop(0,'#0a0a2e'); grad.addColorStop(1,'#1a1a4e');
  ctx.fillStyle=grad; ctx.fillRect(0,0,BASE_W,GROUND_Y);

  // Stars (static)
  ctx.fillStyle='rgba(255,255,255,0.6)';
  const starSeed=createRNG(12345);
  for(let i=0;i<40;i++){
    const sx=starSeed.random()*BASE_W, sy=starSeed.random()*(GROUND_Y*0.6);
    const off=(G.bg.sky*0.05)%BASE_W;
    ctx.beginPath(); ctx.arc(((sx-off+BASE_W)%BASE_W),sy,starSeed.random()*1.5+0.5,0,Math.PI*2); ctx.fill();
  }

  // Mountains
  ctx.fillStyle='#1a2a4a';
  const mtnRng=createRNG(99999);
  for(let i=0;i<8;i++){
    const mx=((mtnRng.random()*BASE_W*1.5 - G.bg.mtn%BASE_W)+BASE_W*2)%BASE_W - 40;
    const mh=mtnRng.int(40,90);
    ctx.beginPath(); ctx.moveTo(mx,GROUND_Y); ctx.lineTo(mx+40,GROUND_Y-mh); ctx.lineTo(mx+80,GROUND_Y); ctx.fill();
  }

  // Ground
  ctx.fillStyle='#2a3a2a'; ctx.fillRect(0,GROUND_Y,BASE_W,BASE_H-GROUND_Y);
  // Ground detail lines
  ctx.strokeStyle='#3a4a3a'; ctx.lineWidth=1;
  for(let x=0;x<BASE_W+32;x+=32){
    const gx=((x-G.bg.ground%32)+32)%32*1-32;
    if(gx<BASE_W+32){ctx.beginPath();ctx.moveTo(gx,GROUND_Y+8);ctx.lineTo(gx+16,GROUND_Y+8);ctx.stroke();}
  }
}

function drawPlayer() {
  const p=G.player;
  const ph=p.ducking?DUCK_H:PLAYER_H;
  const blink=p.invincible>0&&Math.floor(p.invincible/6)%2===0;
  if(blink) return;

  const x=PLAYER_X, y=p.y;
  // Body
  ctx.fillStyle='#4a9eff';
  ctx.fillRect(x,y,PLAYER_W,ph);
  // Legs animation (only when on ground)
  const onGround=p.y>=GROUND_Y-ph-2;
  if(onGround&&!p.ducking){
    ctx.fillStyle='#2266cc';
    const legH=8, legW=8;
    const offsets=[0,4,-4,0];
    const leg1Y=y+ph-legH+offsets[p.runFrame];
    const leg2Y=y+ph-legH+offsets[(p.runFrame+2)%4];
    ctx.fillRect(x+2,leg1Y,legW,legH);
    ctx.fillRect(x+PLAYER_W-legW-2,leg2Y,legW,legH);
  }
  // Eyes
  ctx.fillStyle='#fff';
  if(!p.ducking){
    ctx.fillRect(x+6,y+8,6,6); ctx.fillRect(x+16,y+8,6,6);
    ctx.fillStyle='#000'; ctx.fillRect(x+8,y+10,3,3); ctx.fillRect(x+18,y+10,3,3);
  } else {
    ctx.fillRect(x+6,y+6,5,5); ctx.fillRect(x+16,y+6,5,5);
    ctx.fillStyle='#000'; ctx.fillRect(x+8,y+8,2,2); ctx.fillRect(x+17,y+8,2,2);
  }
}

function drawObstacles() {
  for (const o of G.obstacles) {
    if(o.type==='gap'){
      ctx.fillStyle='#000'; ctx.fillRect(o.x,GROUND_Y,o.w,BASE_H-GROUND_Y);
      ctx.fillStyle='#0a0a1a'; ctx.fillRect(o.x,0,o.w,GROUND_Y);
      // Edge darkness
      ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.fillRect(o.x-4,GROUND_Y-4,8,8); ctx.fillRect(o.x+o.w-4,GROUND_Y-4,8,8);
    } else {
      ctx.fillStyle=o.color;
      ctx.fillRect(o.x,o.y,o.w,o.h);
      ctx.fillStyle='rgba(255,255,255,0.15)';
      ctx.fillRect(o.x,o.y,o.w,4); ctx.fillRect(o.x,o.y,4,o.h);
    }
  }
}

function drawCoins() {
  for(const c of G.coins){
    if(c.collected) continue;
    ctx.fillStyle='#ffd700';
    ctx.beginPath(); ctx.arc(c.x,c.y,c.r,0,Math.PI*2); ctx.fill();
    ctx.fillStyle='#ffaa00';
    ctx.beginPath(); ctx.arc(c.x-2,c.y-2,c.r*0.5,0,Math.PI*2); ctx.fill();
  }
}

function drawParticles() {
  for(const pt of G.particles){
    ctx.globalAlpha=pt.life/30;
    ctx.fillStyle=pt.color;
    ctx.fillRect(pt.x-pt.size/2,pt.y-pt.size/2,pt.size,pt.size);
  }
  ctx.globalAlpha=1;
}

function draw() {
  ctx.clearRect(0,0,BASE_W,BASE_H);
  drawBG();
  drawObstacles();
  drawCoins();
  drawPlayer();
  drawParticles();
  // Coin counter
  ctx.fillStyle='#ffd700'; ctx.font='bold 14px monospace';
  ctx.fillText('●'+G.coinCount, BASE_W-60, 20);
}

/* ── Game Loop ───────────────────────────────────── */
let rafId;
function loop() {
  update();
  draw();
  rafId=requestAnimationFrame(loop);
}

/* ── Controls ────────────────────────────────────── */
function doJump() {
  const p=G.player;
  const onGround=p.y>=GROUND_Y-(p.ducking?DUCK_H:PLAYER_H)-2;
  if(!G.started){
    G.started=true;
    document.getElementById('start-overlay').style.display='none';
    document.getElementById('touch-hint').style.display='none';
    return;
  }
  if(G.over) return;
  if(onGround||p.jumps===0){ p.vy=JUMP_V; p.jumps=1; p.y=Math.min(p.y,GROUND_Y-PLAYER_H-1); }
  else if(p.jumps===1){ p.vy=DBL_JUMP_V; p.jumps=2; }
}

function startDuck(){ if(G.started&&!G.over){ G.player.ducking=true; } }
function endDuck(){   G.player.ducking=false; }

// Keyboard
const keys={};
document.addEventListener('keydown',e=>{
  if(keys[e.code]) return;
  keys[e.code]=true;
  if(e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW'){ e.preventDefault(); doJump(); }
  if(e.code==='ArrowDown'||e.code==='KeyS'){ e.preventDefault(); startDuck(); }
});
document.addEventListener('keyup',e=>{ keys[e.code]=false; if(e.code==='ArrowDown'||e.code==='KeyS') endDuck(); });

// Touch
let touchStartY=0, touchStartT=0, isDucking=false;
wrap.addEventListener('touchstart',e=>{
  e.preventDefault();
  touchStartY=e.touches[0].clientY;
  touchStartT=Date.now();
  isDucking=false;
},{ passive:false });
wrap.addEventListener('touchmove',e=>{
  e.preventDefault();
  const dy=e.touches[0].clientY-touchStartY;
  if(dy>30&&!isDucking){ isDucking=true; startDuck(); }
},{ passive:false });
wrap.addEventListener('touchend',e=>{
  e.preventDefault();
  if(!isDucking){ doJump(); }
  endDuck(); isDucking=false;
},{ passive:false });

document.getElementById('go-restart').addEventListener('click',()=>{ initGame(); });

/* ── Init ────────────────────────────────────────── */
initGame();
loop();
</script>
</body>
</html>
