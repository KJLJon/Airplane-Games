<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Snake – Airplane Games</title>
  <base href="/airplane-games/">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/main.css">
  <style>
    :root { --game-color: #2ecc71; }

    body { display: flex; flex-direction: column; height: 100dvh; overflow: hidden; background: var(--bg-deep); }

    .game-header { display: flex; align-items: center; gap: 0.75rem; padding: 0.625rem 1rem; background: var(--bg-panel); border-bottom: 1px solid var(--border-subtle); flex-shrink: 0; }
    .game-header h1 { flex: 1; font-size: 1.1rem; font-weight: 700; font-family: 'Outfit', sans-serif; }
    .score-group { display: flex; flex-direction: column; align-items: flex-end; line-height: 1.2; }
    .score-label { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-dim); }
    .score-value { font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 700; color: var(--game-color); font-variant-numeric: tabular-nums; }

    #game-area { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; padding: 0.5rem; overflow: hidden; position: relative; }

    #canvas-wrap { position: relative; flex-shrink: 0; }
    #gameCanvas { display: block; border-radius: 8px; background: #0a0a10; border: 1px solid var(--border-subtle); }

    /* Power-up HUD */
    #powerup-hud { display: flex; gap: 0.5rem; height: 24px; }
    .pu-badge { display: none; align-items: center; gap: 4px; font-size: 0.7rem; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
    .pu-badge.active { display: flex; }
    .pu-ghost { background: rgba(156,39,176,0.35); color: #ce93d8; border: 1px solid #ce93d8; }
    .pu-slow  { background: rgba(33,150,243,0.35); color: #90caf9; border: 1px solid #90caf9; }
    .pu-double{ background: rgba(255,193,7,0.35);  color: #ffe082; border: 1px solid #ffe082; }

    /* Mode selector overlay */
    #mode-screen { position: absolute; inset: 0; background: rgba(13,13,16,0.97); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; z-index: 20; border-radius: 8px; padding: 1.5rem; }
    #mode-screen h2 { font-family: 'Outfit', sans-serif; font-size: 1.4rem; color: var(--game-color); }
    .mode-btn { width: 200px; padding: 0.75rem 1rem; border: 2px solid var(--border-subtle); border-radius: 10px; background: var(--bg-card); color: var(--text-primary); font-family: 'Outfit', sans-serif; font-size: 0.95rem; font-weight: 600; cursor: pointer; text-align: left; transition: border-color 0.15s, background 0.15s; }
    .mode-btn:hover { border-color: var(--game-color); background: rgba(46,204,113,0.1); }
    .mode-btn small { display: block; font-size: 0.72rem; font-weight: 400; color: var(--text-dim); margin-top: 2px; }

    /* Game over overlay */
    #over-screen { position: absolute; inset: 0; background: rgba(13,13,16,0.97); display: none; flex-direction: column; align-items: center; justify-content: center; gap: 0.75rem; z-index: 20; border-radius: 8px; padding: 1.5rem; }
    #over-screen h2 { font-family: 'Outfit', sans-serif; font-size: 1.6rem; }
    #over-screen.show { display: flex; }
    .over-score { font-size: 1rem; color: var(--text-dim); }
    .over-score span { color: var(--game-color); font-weight: 700; font-size: 1.2rem; }
    .play-btn { padding: 0.75rem 2rem; border: 2px solid var(--game-color); border-radius: 10px; background: rgba(46,204,113,0.12); color: var(--game-color); font-family: 'Outfit', sans-serif; font-size: 1rem; font-weight: 700; cursor: pointer; transition: background 0.15s; }
    .play-btn:hover { background: rgba(46,204,113,0.25); }

    /* D-pad */
    #dpad { display: grid; grid-template-columns: repeat(3, 52px); grid-template-rows: repeat(3, 52px); gap: 4px; flex-shrink: 0; }
    .dpad-btn { min-height: 52px; min-width: 52px; border: 2px solid var(--border-subtle); border-radius: 8px; background: var(--bg-card); color: var(--text-primary); font-size: 1.2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.1s; -webkit-tap-highlight-color: transparent; user-select: none; }
    .dpad-btn:active { background: rgba(46,204,113,0.25); }
    .dpad-center { background: transparent; border-color: transparent; pointer-events: none; }

    /* Timer for time attack */
    #timer-wrap { font-family: 'Outfit', sans-serif; font-size: 0.9rem; font-weight: 700; color: var(--accent-warm); display: none; }
    #timer-wrap.active { display: block; }

    @media (max-height: 600px) {
      #dpad { grid-template-columns: repeat(3, 44px); grid-template-rows: repeat(3, 44px); }
      .dpad-btn { min-height: 44px; min-width: 44px; }
    }
  </style>
</head>
<body>
<header class="game-header">
  <a href="/airplane-games/" class="btn btn-back" style="min-height:36px;min-width:36px;padding:0.25rem;font-size:1.1rem;">←</a>
  <h1>🐍 Snake</h1>
  <div id="timer-wrap" class="active"></div>
  <div class="score-group">
    <span class="score-label">Score</span>
    <span class="score-value" id="score-display">0</span>
  </div>
  <div class="score-group">
    <span class="score-label">Best</span>
    <span class="score-value" id="best-display">0</span>
  </div>
</header>

<div id="game-area">
  <div id="powerup-hud">
    <div class="pu-badge pu-ghost" id="pu-ghost">👻 Ghost <span id="pu-ghost-t"></span></div>
    <div class="pu-badge pu-slow"  id="pu-slow">🐢 Slow <span id="pu-slow-t"></span></div>
    <div class="pu-badge pu-double" id="pu-double">⚡ 2× <span id="pu-double-t"></span></div>
  </div>

  <div id="canvas-wrap">
    <canvas id="gameCanvas"></canvas>
    <div id="mode-screen">
      <h2>🐍 Snake</h2>
      <button class="mode-btn" onclick="startGame('classic')">
        Classic
        <small>Walls = game over</small>
      </button>
      <button class="mode-btn" onclick="startGame('endless')">
        Endless
        <small>Wrap around walls</small>
      </button>
      <button class="mode-btn" onclick="startGame('timeattack')">
        Time Attack
        <small>60 seconds – max score!</small>
      </button>
    </div>
    <div id="over-screen">
      <h2 id="over-title">Game Over</h2>
      <div class="over-score">Score: <span id="over-score">0</span></div>
      <div class="over-score">Best: <span id="over-best">0</span></div>
      <button class="play-btn" onclick="showModeScreen()">Play Again</button>
    </div>
  </div>

  <div id="dpad">
    <div></div>
    <button class="dpad-btn" id="btn-up" ontouchstart="dpadPress('up')" onclick="dpadPress('up')">▲</button>
    <div></div>
    <button class="dpad-btn" id="btn-left" ontouchstart="dpadPress('left')" onclick="dpadPress('left')">◀</button>
    <div class="dpad-center"></div>
    <button class="dpad-btn" id="btn-right" ontouchstart="dpadPress('right')" onclick="dpadPress('right')">▶</button>
    <div></div>
    <button class="dpad-btn" id="btn-down" ontouchstart="dpadPress('down')" onclick="dpadPress('down')">▼</button>
    <div></div>
  </div>
</div>

<script src="js/shared.js"></script>
<script>
// ── Canvas & Grid setup ──────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const GRID = 20;
let CELL, W_CELLS = GRID, H_CELLS = GRID;

function resizeCanvas() {
  const area = document.getElementById('game-area');
  const dpad = document.getElementById('dpad');
  const hud  = document.getElementById('powerup-hud');
  const areaH = area.clientHeight;
  const areaW  = area.clientWidth;
  const usedH  = dpad.offsetHeight + hud.offsetHeight + 20; // gaps
  const avail  = Math.min(areaW, areaH - usedH) - 16;
  CELL = Math.floor(avail / GRID);
  canvas.width  = CELL * GRID;
  canvas.height = CELL * GRID;
}

// ── State ────────────────────────────────────────────────────
let snake, dir, nextDir, food, powerups, score, highScore;
let gameLoop, mode, gameOver, frameMs, foodEaten;
let ghostTimer = 0, slowTimer = 0, doubleTimer = 0;
let touchStartX, touchStartY;
let timeLeft = 60, timerInterval;

const BASE_SPEED = 150;   // ms per frame

function getGameId(m) { return 'snake-' + m; }

function getBest(m) {
  const rec = Scores.get(getGameId(m));
  return rec ? rec.score : 0;
}

// ── Init ─────────────────────────────────────────────────────
function showModeScreen() {
  clearGame();
  document.getElementById('mode-screen').style.display = 'flex';
  document.getElementById('over-screen').classList.remove('show');
  document.getElementById('timer-wrap').classList.remove('active');
}

function clearGame() {
  clearInterval(gameLoop);
  clearInterval(timerInterval);
  gameLoop = null;
  timerInterval = null;
  gameOver = true;
}

function startGame(m) {
  mode = m;
  document.getElementById('mode-screen').style.display = 'none';
  document.getElementById('over-screen').classList.remove('show');
  resizeCanvas();

  const cx = Math.floor(W_CELLS / 2);
  const cy = Math.floor(H_CELLS / 2);
  snake = [{x: cx, y: cy}, {x: cx-1, y: cy}, {x: cx-2, y: cy}];
  dir = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
  score = 0;
  foodEaten = 0;
  frameMs = BASE_SPEED;
  ghostTimer = 0; slowTimer = 0; doubleTimer = 0;
  powerups = [];
  gameOver = false;

  highScore = getBest(mode);
  updateScoreDisplay();

  if (mode === 'timeattack') {
    timeLeft = 60;
    const tw = document.getElementById('timer-wrap');
    tw.classList.add('active');
    tw.textContent = '⏱ ' + timeLeft + 's';
    timerInterval = setInterval(() => {
      if (gameOver) return;
      timeLeft--;
      tw.textContent = '⏱ ' + timeLeft + 's';
      if (timeLeft <= 0) endGame();
    }, 1000);
  } else {
    document.getElementById('timer-wrap').classList.remove('active');
  }

  spawnFood();
  clearInterval(gameLoop);
  gameLoop = setInterval(tick, frameMs);
  draw();
}

// ── Food & Power-ups ─────────────────────────────────────────
function spawnFood() {
  food = randomFreeCell();
}

function randomFreeCell() {
  let cell;
  let tries = 0;
  do {
    cell = { x: Math.floor(Math.random() * W_CELLS), y: Math.floor(Math.random() * H_CELLS) };
    tries++;
  } while (tries < 200 && (onSnake(cell) || powerups.some(p => p.x === cell.x && p.y === cell.y)));
  return cell;
}

function onSnake(cell) {
  return snake.some(s => s.x === cell.x && s.y === cell.y);
}

function trySpawnPowerup() {
  if (powerups.length >= 2) return;
  if (Math.random() > 0.3) return;
  const types = ['ghost', 'slow', 'double'];
  const type = types[Math.floor(Math.random() * types.length)];
  const pos = randomFreeCell();
  powerups.push({ ...pos, type, life: 8000 });
}

// ── Tick ─────────────────────────────────────────────────────
function tick() {
  if (gameOver) return;

  dir = { ...nextDir };

  // Age power-up items
  const dt = frameMs;
  powerups = powerups.filter(p => { p.life -= dt; return p.life > 0; });

  // Update timers
  if (ghostTimer > 0)  { ghostTimer  = Math.max(0, ghostTimer  - dt); updatePUDisplay(); }
  if (slowTimer  > 0)  { slowTimer   = Math.max(0, slowTimer   - dt); updatePUDisplay(); }
  if (doubleTimer > 0) { doubleTimer = Math.max(0, doubleTimer - dt); updatePUDisplay(); }

  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // Wall handling
  if (mode === 'endless') {
    head.x = ((head.x % W_CELLS) + W_CELLS) % W_CELLS;
    head.y = ((head.y % H_CELLS) + H_CELLS) % H_CELLS;
  } else {
    if (head.x < 0 || head.x >= W_CELLS || head.y < 0 || head.y >= H_CELLS) {
      endGame(); return;
    }
  }

  // Self collision
  if (ghostTimer <= 0 && onSnake(head)) {
    endGame(); return;
  }

  snake.unshift(head);

  // Eat food?
  if (head.x === food.x && head.y === food.y) {
    foodEaten++;
    const pts = doubleTimer > 0 ? 20 : 10;
    score += pts;
    spawnFood();
    trySpawnPowerup();
    updateScoreDisplay();
    // Speed up every 5 food
    if (foodEaten % 5 === 0 && !slowTimer) {
      frameMs = Math.max(60, frameMs - 10);
      resetLoop();
    }
  } else {
    snake.pop();
  }

  // Pick up powerup?
  for (let i = powerups.length - 1; i >= 0; i--) {
    const p = powerups[i];
    if (head.x === p.x && head.y === p.y) {
      activatePowerup(p.type);
      powerups.splice(i, 1);
    }
  }

  draw();
}

function activatePowerup(type) {
  if (type === 'ghost')  { ghostTimer  = 5000; }
  if (type === 'slow')   {
    slowTimer = 5000;
    const saved = frameMs;
    frameMs = Math.min(250, frameMs + 60);
    resetLoop();
    setTimeout(() => {
      if (!gameOver) { frameMs = saved; resetLoop(); }
    }, 5000);
  }
  if (type === 'double') { doubleTimer = 5000; }
  updatePUDisplay();
}

function updatePUDisplay() {
  const gh = document.getElementById('pu-ghost');
  const sl = document.getElementById('pu-slow');
  const db = document.getElementById('pu-double');
  if (ghostTimer > 0) { gh.classList.add('active'); document.getElementById('pu-ghost-t').textContent = Math.ceil(ghostTimer/1000)+'s'; }
  else gh.classList.remove('active');
  if (slowTimer > 0)  { sl.classList.add('active');  document.getElementById('pu-slow-t').textContent  = Math.ceil(slowTimer/1000)+'s'; }
  else sl.classList.remove('active');
  if (doubleTimer > 0){ db.classList.add('active');  document.getElementById('pu-double-t').textContent= Math.ceil(doubleTimer/1000)+'s'; }
  else db.classList.remove('active');
}

function resetLoop() {
  clearInterval(gameLoop);
  gameLoop = setInterval(tick, frameMs);
}

// ── End game ─────────────────────────────────────────────────
function endGame() {
  gameOver = true;
  clearInterval(gameLoop);
  clearInterval(timerInterval);
  const isNew = Scores.set(getGameId(mode), score);
  highScore = getBest(mode);
  document.getElementById('over-title').textContent = mode === 'timeattack' ? 'Time\'s Up!' : 'Game Over';
  document.getElementById('over-score').textContent = score;
  document.getElementById('over-best').textContent = highScore;
  document.getElementById('over-screen').classList.add('show');
  if (isNew && score > 0) showToast('New High Score! 🎉');
  draw();
}

// ── Score display ─────────────────────────────────────────────
function updateScoreDisplay() {
  document.getElementById('score-display').textContent = score;
  document.getElementById('best-display').textContent = getBest(mode) || 0;
}

// ── Drawing ───────────────────────────────────────────────────
function draw() {
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= W_CELLS; x++) { ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,h); ctx.stroke(); }
  for (let y = 0; y <= H_CELLS; y++) { ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(w,y*CELL); ctx.stroke(); }

  // Snake
  const ghost = ghostTimer > 0;
  snake.forEach((seg, i) => {
    const alpha = ghost ? 0.5 : 1;
    const ratio = i / snake.length;
    const r = Math.round(46 - ratio * 20);
    const g = Math.round(204 - ratio * 60);
    const b = Math.round(113 - ratio * 30);
    ctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
    roundRect(ctx, seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2, Math.max(2, CELL * 0.2));
    ctx.fill();
    if (i === 0) {
      // Eyes
      ctx.fillStyle = `rgba(0,0,0,${alpha})`;
      const ex = seg.x * CELL + CELL * 0.3 + dir.x * CELL * 0.15;
      const ey = seg.y * CELL + CELL * 0.3 + dir.y * CELL * 0.15;
      const er = Math.max(1.5, CELL * 0.1);
      ctx.beginPath(); ctx.arc(ex, ey, er, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(ex + dir.y * CELL * 0.3, ey + dir.x * CELL * 0.3, er, 0, Math.PI * 2); ctx.fill();
    }
  });

  // Food
  const fc = food;
  const cx = fc.x * CELL + CELL / 2, cy2 = fc.y * CELL + CELL / 2;
  const rad = CELL * 0.38;
  const grd = ctx.createRadialGradient(cx - rad*0.3, cy2 - rad*0.3, rad*0.1, cx, cy2, rad);
  grd.addColorStop(0, '#ff6b6b');
  grd.addColorStop(1, '#c0392b');
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(cx, cy2, rad, 0, Math.PI*2); ctx.fill();
  // leaf
  ctx.fillStyle = '#2ecc71';
  ctx.beginPath(); ctx.ellipse(cx + 1, cy2 - rad + 1, 3, 5, 0.5, 0, Math.PI*2); ctx.fill();

  // Power-up items
  powerups.forEach(p => {
    const px = p.x * CELL + CELL/2, py = p.y * CELL + CELL/2;
    const pr = CELL * 0.38;
    ctx.beginPath(); ctx.arc(px, py, pr, 0, Math.PI*2);
    if (p.type === 'ghost')  ctx.fillStyle = '#9c27b0';
    if (p.type === 'slow')   ctx.fillStyle = '#2196f3';
    if (p.type === 'double') ctx.fillStyle = '#ffc107';
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.font = `${Math.max(10, CELL*0.5)}px serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const em = p.type === 'ghost' ? '👻' : p.type === 'slow' ? '🐢' : '⚡';
    ctx.fillText(em, px, py);
  });
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ── Controls ──────────────────────────────────────────────────
function dpadPress(d) {
  setDir(d);
}

function setDir(d) {
  if (d === 'up'    && dir.y !== 1)  nextDir = {x:0, y:-1};
  if (d === 'down'  && dir.y !== -1) nextDir = {x:0, y:1};
  if (d === 'left'  && dir.x !== 1)  nextDir = {x:-1, y:0};
  if (d === 'right' && dir.x !== -1) nextDir = {x:1, y:0};
}

document.addEventListener('keydown', e => {
  const map = { ArrowUp:'up', ArrowDown:'down', ArrowLeft:'left', ArrowRight:'right',
                w:'up', s:'down', a:'left', d:'right' };
  if (map[e.key]) { e.preventDefault(); setDir(map[e.key]); }
});

canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: true });

canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy)) {
    setDir(dx > 0 ? 'right' : 'left');
  } else {
    setDir(dy > 0 ? 'down' : 'up');
  }
}, { passive: true });

window.addEventListener('resize', () => {
  if (!gameOver) { resizeCanvas(); draw(); }
});

// ── Init ─────────────────────────────────────────────────────
resizeCanvas();
showModeScreen();
registerServiceWorker();
</script>
</body>
</html>
