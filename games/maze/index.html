<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <base href="/airplane-games/">
  <title>Maze – Airplane Games</title>
  <link rel="stylesheet" href="css/main.css">
  <style>
    body { display:flex; flex-direction:column; height:100dvh; overflow:hidden; background:#0a0a12; }
    .game-header { flex-shrink:0; }
    #game-area { flex:1; position:relative; overflow:hidden; display:flex; flex-direction:column; }
    #info-bar {
      display:flex; align-items:center; justify-content:space-between;
      padding:4px 12px; background:rgba(22,22,28,0.9); border-bottom:1px solid rgba(255,255,255,0.07);
      font-family:'Outfit',sans-serif; font-size:13px; color:#888899; gap:8px; flex-shrink:0;
    }
    #info-bar span { color:#f0f0f5; font-weight:600; }
    #canvas-wrap { flex:1; position:relative; touch-action:none; }
    #mazeCanvas { position:absolute; top:0; left:0; width:100%; height:100%; }
    /* D-pad */
    #dpad {
      position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
      display:grid; grid-template-areas:"  up  " "left down right";
      grid-template-columns:52px 52px 52px;
      grid-template-rows:52px 52px;
      gap:4px; z-index:10;
    }
    .dpad-btn {
      width:52px; height:52px; border-radius:10px;
      background:rgba(124,106,247,0.25); border:2px solid rgba(124,106,247,0.5);
      color:#a090ff; font-size:1.3rem; cursor:pointer; touch-action:manipulation;
      display:flex; align-items:center; justify-content:center;
      user-select:none; -webkit-tap-highlight-color:transparent;
    }
    .dpad-btn:active { background:rgba(124,106,247,0.5); }
    #btn-up    { grid-area:up; }
    #btn-left  { grid-area:left; }
    #btn-down  { grid-area:down; }
    #btn-right { grid-area:right; }
    #btn-map {
      position:absolute; bottom:16px; right:12px;
      width:52px; height:52px; border-radius:10px;
      background:rgba(46,204,113,0.2); border:2px solid rgba(46,204,113,0.5);
      color:#2ecc71; font-size:0.75rem; font-weight:700; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      touch-action:manipulation; user-select:none; z-index:10;
      -webkit-tap-highlight-color:transparent;
    }
    /* Overlays */
    .overlay {
      position:absolute; inset:0; display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      background:rgba(0,0,0,0.82); text-align:center; padding:1.5rem;
      gap:0.9rem; z-index:30;
    }
    .overlay h2 { font-family:'Outfit',sans-serif; font-size:1.9rem; color:#f0f0f5; margin:0; }
    .overlay p  { color:#888899; font-size:1rem; margin:0; }
    .overlay .big-num { font-family:'Outfit',sans-serif; font-size:3rem; font-weight:700; color:#7c6af7; }
    .btn-filled {
      background:#7c6af7; border:none; color:#fff; border-radius:10px;
      padding:12px 28px; font-size:1rem; font-weight:700; cursor:pointer;
      font-family:'Outfit',sans-serif; min-height:44px;
      -webkit-tap-highlight-color:transparent;
    }
    .btn-filled:active { opacity:0.85; }
    .hidden { display:none !important; }
  </style>
</head>
<body>

<header class="game-header">
  <a href="/airplane-games/" class="btn btn-back game-header__back" aria-label="Back to hub">&#8592;</a>
  <span class="game-header__title">Maze</span>
  <div class="game-header__actions">
    <div class="score-display">
      <span class="score-display__label">Level</span>
      <span class="score-display__value" id="level-disp">1</span>
    </div>
  </div>
</header>

<div id="game-area">
  <div id="info-bar">
    <div>Steps: <span id="steps-disp">0</span></div>
    <div>Time: <span id="time-disp">0:00</span></div>
    <div>Best: <span id="best-disp">—</span></div>
  </div>
  <div id="canvas-wrap">
    <canvas id="mazeCanvas"></canvas>
    <button id="btn-map">MAP</button>
    <div id="dpad">
      <button class="dpad-btn" id="btn-up">▲</button>
      <button class="dpad-btn" id="btn-left">◀</button>
      <button class="dpad-btn" id="btn-down">▼</button>
      <button class="dpad-btn" id="btn-right">▶</button>
    </div>

    <div class="overlay" id="start-overlay">
      <h2>MAZE</h2>
      <p>Navigate from top-left ◎ to bottom-right ★</p>
      <p style="font-size:0.85rem;color:#555">Arrow keys / WASD / D-pad / Swipe</p>
      <button class="btn-filled" id="start-btn">Start Level 1</button>
    </div>

    <div class="overlay hidden" id="win-overlay">
      <h2 id="win-title">Level Complete!</h2>
      <p id="win-stats"></p>
      <div class="big-num" id="win-levels"></div>
      <button class="btn-filled" id="next-btn">Next Level</button>
    </div>
  </div>
</div>

<script src="js/shared.js"></script>
<script>
(function(){
'use strict';

/* ── Config ── */
const LEVEL_CONFIGS = [
  // [startLevel, endLevel, cols, rows, fogRadius]
  [1,  25,  10, 10,  99], // no fog (99 = infinite)
  [26, 50,  15, 15,  4],
  [51, 75,  20, 20,  2],
  [76, 100, 25, 25,  2],  // + 3 storm obstacles
];

function getLevelCfg(lvl){
  for(const [s,e,c,r,f] of LEVEL_CONFIGS){
    if(lvl>=s && lvl<=e) return {cols:c,rows:r,fogRadius:f,hasStorms:lvl>=76};
  }
  return {cols:25,rows:25,fogRadius:2,hasStorms:true};
}

/* ── DOM ── */
const canvas = document.getElementById('mazeCanvas');
const ctx = canvas.getContext('2d');
const levelDisp  = document.getElementById('level-disp');
const stepsDisp  = document.getElementById('steps-disp');
const timeDisp   = document.getElementById('time-disp');
const bestDisp   = document.getElementById('best-disp');
const startOv    = document.getElementById('start-overlay');
const winOv      = document.getElementById('win-overlay');
const winTitle   = document.getElementById('win-title');
const winStats   = document.getElementById('win-stats');
const winLevels  = document.getElementById('win-levels');

/* ── State ── */
let W,H,cellSize;
let currentLevel = 1;
let levelsCompleted = 0;
let maze, playerPos, revealed, storms;
let steps=0, startTime=0, timerActive=false;
let showMap=false;
let gameActive=false;

/* ── Resize ── */
function resize(){
  const wrap = document.getElementById('canvas-wrap');
  W = canvas.width  = wrap.offsetWidth  || 360;
  H = canvas.height = wrap.offsetHeight || 540;
}
window.addEventListener('resize', ()=>{ resize(); if(gameActive) drawMaze(); });
resize();

/* ── Maze generation: recursive backtracker ── */
function generateMaze(cols, rows, rng){
  // Each cell: {top,right,bottom,left} = wall present
  const grid = Array.from({length:rows}, ()=>
    Array.from({length:cols}, ()=>({top:true,right:true,bottom:true,left:true,visited:false}))
  );

  function idx(c,r){ return r*cols+c; }
  const stack = [];
  grid[0][0].visited = true;
  stack.push([0,0]);

  while(stack.length){
    const [c,r] = stack[stack.length-1];
    const neighbors = [];
    if(r>0    && !grid[r-1][c].visited) neighbors.push([c,r-1,'top','bottom']);
    if(c<cols-1 && !grid[r][c+1].visited) neighbors.push([c+1,r,'right','left']);
    if(r<rows-1 && !grid[r+1][c].visited) neighbors.push([c,r+1,'bottom','top']);
    if(c>0    && !grid[r][c-1].visited) neighbors.push([c-1,r,'left','right']);

    if(neighbors.length===0){ stack.pop(); continue; }
    const [nc,nr,wall,opposite] = rng.pick(neighbors);
    grid[r][c][wall]   = false;
    grid[nr][nc][opposite] = false;
    grid[nr][nc].visited = true;
    stack.push([nc,nr]);
  }
  return grid;
}

/* ── Storm obstacles ── */
function createStorms(cols, rows, rng){
  const colors = ['rgba(255,60,60,0.35)','rgba(255,165,0,0.35)','rgba(180,0,255,0.35)'];
  return Array.from({length:3},(_,i)=>({
    x: rng.int(3, cols-4),
    y: rng.int(3, rows-4),
    radius: rng.int(2,3),
    dx: (rng.random()-0.5)*0.01,
    dy: (rng.random()-0.5)*0.01,
    fx:0, fy:0,
    color: colors[i],
    moveTimer:0,
  }));
}

/* ── Start level ── */
function startLevel(lvl){
  currentLevel = lvl;
  const cfg = getLevelCfg(lvl);
  const rng = createRNG(getLevelSeed('maze', lvl));

  maze = generateMaze(cfg.cols, cfg.rows, rng);
  playerPos = {c:0, r:0};

  // Revealed fog grid
  revealed = Array.from({length:cfg.rows}, ()=>new Uint8Array(cfg.cols));
  revealAround(0,0,cfg.fogRadius);

  storms = cfg.hasStorms ? createStorms(cfg.cols, cfg.rows, rng) : [];

  steps = 0; startTime = performance.now(); timerActive = true;
  gameActive = true; showMap = false;

  levelDisp.textContent = lvl;
  stepsDisp.textContent = '0';
  const best = Scores.get('maze');
  bestDisp.textContent = best ? best.score : '—';

  resize();
  drawMaze();
}

function revealAround(c, r, radius){
  const cfg = getLevelCfg(currentLevel);
  if(radius >= 99){ // no fog
    for(let rr=0;rr<cfg.rows;rr++) for(let cc=0;cc<cfg.cols;cc++) revealed[rr][cc]=1;
    return;
  }
  for(let dr=-radius; dr<=radius; dr++){
    for(let dc=-radius; dc<=radius; dc++){
      const nr=r+dr, nc=c+dc;
      if(nr>=0 && nr<cfg.rows && nc>=0 && nc<cfg.cols){
        if(Math.hypot(dr,dc) <= radius) revealed[nr][nc]=1;
      }
    }
  }
}

/* ── Move player ── */
function movePlayer(dir){
  if(!gameActive) return;
  const cfg = getLevelCfg(currentLevel);
  const {c,r} = playerPos;
  const cell = maze[r][c];
  let nc=c, nr=r;
  if(dir==='up'    && !cell.top)    nr--;
  else if(dir==='down'  && !cell.bottom) nr++;
  else if(dir==='left'  && !cell.left)   nc--;
  else if(dir==='right' && !cell.right)  nc++;
  else return; // wall

  if(nc<0||nc>=cfg.cols||nr<0||nr>=cfg.rows) return;
  playerPos = {c:nc, r:nr};
  steps++;
  stepsDisp.textContent = steps;

  const fogR = getLevelCfg(currentLevel).fogRadius;
  revealAround(nc, nr, fogR);

  // Check storm collision
  for(const s of storms){
    if(Math.hypot(nc-s.x, nr-s.y) <= s.radius){
      // Reset player to start
      playerPos = {c:0, r:0};
      revealAround(0, 0, fogR);
      showToast('Storm! Sent back to start!');
      drawMaze(); return;
    }
  }

  // Check win
  if(nc === cfg.cols-1 && nr === cfg.rows-1){
    timerActive = false;
    const elapsed = (performance.now()-startTime)/1000;
    levelsCompleted++;
    Scores.set('maze', levelsCompleted);
    showWin(elapsed);
    return;
  }
  drawMaze();
}

/* ── Timer ── */
function updateTimer(){
  if(!timerActive) return;
  const secs = Math.floor((performance.now()-startTime)/1000);
  const m=Math.floor(secs/60), s=secs%60;
  timeDisp.textContent = `${m}:${s.toString().padStart(2,'0')}`;
}

/* ── Storm movement (canvas-space fractional) ── */
function moveStorms(){
  if(!gameActive || !storms.length) return;
  const cfg = getLevelCfg(currentLevel);
  for(const s of storms){
    s.fx = (s.fx||s.x) + s.dx;
    s.fy = (s.fy||s.y) + s.dy;
    // Bounce off walls
    if(s.fx < 1 || s.fx > cfg.cols-2) s.dx *= -1;
    if(s.fy < 1 || s.fy > cfg.rows-2) s.dy *= -1;
    s.x = Math.round(s.fx);
    s.y = Math.round(s.fy);
  }
}

/* ── Draw ── */
function drawMaze(){
  if(!maze) return;
  const cfg = getLevelCfg(currentLevel);
  const {cols, rows} = cfg;

  // Compute cell size to fit canvas
  const mapSize = Math.min(W, H - 20);
  cellSize = Math.floor(Math.min((W-4)/cols, (mapSize-4)/rows));
  if(cellSize < 3) cellSize = 3;
  const mazeW = cellSize * cols;
  const mazeH = cellSize * rows;
  const ox = Math.floor((W - mazeW)/2);
  const oy = Math.floor((H - mazeH)/2);

  ctx.clearRect(0,0,W,H);

  // Background
  ctx.fillStyle = '#0a0a12';
  ctx.fillRect(0,0,W,H);

  // Fog base layer (dark over unrevealed areas)
  const fogRadius = cfg.fogRadius;
  if(fogRadius < 99){
    ctx.fillStyle = 'rgba(0,0,0,0.92)';
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        if(!revealed[r][c]){
          ctx.fillRect(ox+c*cellSize, oy+r*cellSize, cellSize, cellSize);
        }
      }
    }
  }

  // Draw cells and walls
  ctx.strokeStyle = '#3a3a5a';
  ctx.lineWidth = 1;

  for(let r=0; r<rows; r++){
    for(let c=0; c<cols; c++){
      if(!revealed[r][c]) continue;
      const x = ox + c*cellSize;
      const y = oy + r*cellSize;
      const cell = maze[r][c];

      // Cell background
      ctx.fillStyle = '#0f0f1a';
      ctx.fillRect(x, y, cellSize, cellSize);

      // Walls
      ctx.strokeStyle = '#5060a0';
      ctx.lineWidth = Math.max(1, cellSize*0.08);
      if(cell.top){
        ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x+cellSize,y); ctx.stroke();
      }
      if(cell.right){
        ctx.beginPath(); ctx.moveTo(x+cellSize,y); ctx.lineTo(x+cellSize,y+cellSize); ctx.stroke();
      }
      if(cell.bottom){
        ctx.beginPath(); ctx.moveTo(x,y+cellSize); ctx.lineTo(x+cellSize,y+cellSize); ctx.stroke();
      }
      if(cell.left){
        ctx.beginPath(); ctx.moveTo(x,y); ctx.lineTo(x,y+cellSize); ctx.stroke();
      }
    }
  }

  // Border
  ctx.strokeStyle = '#5060a0';
  ctx.lineWidth = Math.max(1, cellSize*0.1);
  ctx.strokeRect(ox, oy, mazeW, mazeH);

  // Exit marker
  const ex = ox + (cols-1)*cellSize + cellSize/2;
  const ey = oy + (rows-1)*cellSize + cellSize/2;
  if(revealed[rows-1][cols-1]){
    ctx.fillStyle = '#2ecc71';
    ctx.font = `bold ${Math.max(10, cellSize*0.7)}px Outfit`;
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillText('★', ex, ey);
  }

  // Storm zones
  storms.forEach(s => {
    const sx = ox + (s.fx||s.x)*cellSize;
    const sy = oy + (s.fy||s.y)*cellSize;
    const sr = s.radius * cellSize;
    const grad = ctx.createRadialGradient(sx,sy,0, sx,sy,sr);
    grad.addColorStop(0, s.color.replace('0.35','0.6'));
    grad.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI*2);
    ctx.fillStyle = grad;
    ctx.fill();
  });

  // Player
  const px = ox + playerPos.c*cellSize + cellSize/2;
  const py = oy + playerPos.r*cellSize + cellSize/2;
  const pr = Math.max(3, cellSize*0.3);
  ctx.beginPath(); ctx.arc(px, py, pr, 0, Math.PI*2);
  ctx.fillStyle = '#7c6af7';
  ctx.shadowBlur = 8; ctx.shadowColor = '#7c6af7';
  ctx.fill(); ctx.shadowBlur = 0;

  // Mini-map overlay
  if(showMap && fogRadius < 99){
    drawMiniMap(cols, rows, ox, oy, mazeW, mazeH);
  }
}

function drawMiniMap(cols, rows, ox, oy, mazeW, mazeH){
  const mScale = 3;
  const mW = cols*mScale, mH = rows*mScale;
  const mx = W - mW - 8, my = H - mH - 70;
  ctx.fillStyle = 'rgba(10,10,18,0.9)';
  ctx.fillRect(mx-2, my-2, mW+4, mH+4);
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      if(revealed[r][c]){
        ctx.fillStyle = '#1e1e28';
        ctx.fillRect(mx+c*mScale, my+r*mScale, mScale, mScale);
      }
    }
  }
  // Player on minimap
  ctx.fillStyle = '#7c6af7';
  ctx.fillRect(mx+playerPos.c*mScale, my+playerPos.r*mScale, mScale, mScale);
  // Exit
  ctx.fillStyle = '#2ecc71';
  ctx.fillRect(mx+(cols-1)*mScale, my+(rows-1)*mScale, mScale, mScale);
}

function showWin(elapsed){
  gameActive = false;
  winTitle.textContent = currentLevel >= 100 ? 'All 100 Levels Done!' : `Level ${currentLevel} Complete!`;
  const m=Math.floor(elapsed/60), s=Math.floor(elapsed%60);
  winStats.textContent = `Steps: ${steps}  •  Time: ${m}:${s.toString().padStart(2,'0')}`;
  winLevels.textContent = `${levelsCompleted} Levels Completed`;
  winOv.classList.remove('hidden');
}

/* ── Controls: Keyboard ── */
document.addEventListener('keydown', e=>{
  if(!gameActive) return;
  if(e.code==='ArrowUp'   ||e.code==='KeyW'){ e.preventDefault(); movePlayer('up'); }
  if(e.code==='ArrowDown' ||e.code==='KeyS'){ e.preventDefault(); movePlayer('down'); }
  if(e.code==='ArrowLeft' ||e.code==='KeyA'){ e.preventDefault(); movePlayer('left'); }
  if(e.code==='ArrowRight'||e.code==='KeyD'){ e.preventDefault(); movePlayer('right'); }
});

/* ── Controls: D-pad ── */
document.getElementById('btn-up').addEventListener('click',    ()=>movePlayer('up'));
document.getElementById('btn-down').addEventListener('click',  ()=>movePlayer('down'));
document.getElementById('btn-left').addEventListener('click',  ()=>movePlayer('left'));
document.getElementById('btn-right').addEventListener('click', ()=>movePlayer('right'));

/* ── Controls: Swipe ── */
let touchStartX=0, touchStartY=0;
canvas.addEventListener('touchstart', e=>{ touchStartX=e.touches[0].clientX; touchStartY=e.touches[0].clientY; e.preventDefault(); },{passive:false});
canvas.addEventListener('touchend', e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  const dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)<10 && Math.abs(dy)<10) return;
  if(Math.abs(dx)>Math.abs(dy)){
    movePlayer(dx>0?'right':'left');
  } else {
    movePlayer(dy>0?'down':'up');
  }
},{passive:false});

/* ── Map toggle ── */
document.getElementById('btn-map').addEventListener('click',()=>{
  showMap = !showMap;
  drawMaze();
});

/* ── Buttons ── */
document.getElementById('start-btn').addEventListener('click',()=>{
  startOv.classList.add('hidden');
  levelsCompleted = 0;
  startLevel(1);
});
document.getElementById('next-btn').addEventListener('click',()=>{
  winOv.classList.add('hidden');
  if(currentLevel >= 100){
    startLevel(1);
  } else {
    startLevel(currentLevel+1);
  }
});

/* ── Game loop (timer + storms) ── */
function loop(){
  updateTimer();
  if(gameActive && storms.length){
    moveStorms();
    drawMaze();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

})();
</script>
</body>
</html>
